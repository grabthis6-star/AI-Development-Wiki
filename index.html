const docs=[
['start-here','처음 시작하기','새 채팅의 GPT가 가장 먼저 읽는 핵심 안내서','🚩','시작하기','start here 새 프로젝트 규칙 gpt',[['한 줄 설명','새 채팅의 AI가 사용자의 수준과 개발 방식을 빠르게 이해하도록 전달하는 출발 문서다.'],['왜 필요한가?','새 채팅은 이전 프로젝트의 모든 맥락을 자동으로 알지 못한다. 이 문서를 먼저 읽히면 긴 설명을 반복하지 않아도 공통 규칙부터 맞출 수 있다.'],['새 프로젝트 시작 순서','1. 이 문서 주소를 AI에게 전달한다.\n2. 만들 프로그램의 목적을 한두 문장으로 말한다.\n3. 가장 작은 핵심 기능부터 시작한다.\n4. GitHub에 기록하고 실제 배포 사이트에서 확인한다.'],['개발 원칙','사용자는 비개발자 기준으로 설명받는다. 기능은 작게 나누고, 확인되지 않은 작업을 완료라고 말하지 않는다. 원본은 GitHub에 저장하고 Vercel로 배포한다. 중요한 결정과 해결법은 이 위키에 남긴다.'],['새 채팅에 붙여 넣기','PROMPT::아래 AI Development Wiki의 시작 문서를 먼저 읽고 그 규칙을 기준으로 작업해.\n위키: https://ai-development-wiki.vercel.app/#/start-here\n\n이번 프로그램의 목적:\n[여기에 한두 문장으로 작성]\n\n사용자는 비개발자이므로 쉬운 말로 설명하고, 기능을 작은 단위로 나누며, 실제 결과를 확인한 뒤 다음 작업을 진행해.'],['이것만 기억하자','새 프로젝트 = 시작 문서 주소 + 프로그램 목적 한두 문장']],['ai-collaboration','project-checklist','prompt-library']],
['ai-collaboration','AI와 협업하기','AI를 개발자로 활용하면서 방향과 품질을 지키는 작업 방식','🤖','AI 협업','chatgpt 프롬프트 협업 개발자 pm',[['한 줄 설명','AI에게 모든 것을 한꺼번에 맡기지 않고 목적, 우선순위, 확인 기준을 공유하며 함께 만드는 방식이다.'],['역할 나누기','사용자는 무엇을 만들지와 실제 사용 느낌을 판단한다. AI는 설계, 코드 수정, 오류 분석, 기록을 담당한다.'],['좋은 진행 방식','작은 기능 정의 → 구현 → GitHub 기록 → Vercel 배포 → 실제 확인 → 배운 점 기록 순서가 가장 안전하다.'],['주의할 점','AI가 그럴듯하게 말해도 실제 GitHub나 배포 결과가 확인되지 않았다면 완료된 것이 아니다.'],['이것만 기억하자','AI는 개발자, 사용자는 제품 방향을 결정하는 사람']],['start-here','project-checklist','verified-work']],

['vscode','VS Code','프로그램을 만들고 고치는 작업실','💻','개발환경','에디터 작업실 코드',[['한 줄 설명','프로그램 파일을 열고 작성하고 고치는 작업실이다.'],['왜 필요한가?','여러 파일을 한곳에서 확인하고 코드를 수정하며 명령어를 실행할 수 있다.'],['쉽게 비유하면','작업대, 서랍, 공구함이 한 공간에 모여 있는 개발 작업실이다.'],['GuideFlow에서는?','프로젝트 파일을 직접 확인하거나 수정할 때 사용하는 기본 작업 공간이었다.'],['이것만 기억하자','VS Code = 프로그램을 만드는 작업실']],['nodejs','github','cursor']],

['github','GitHub','코드와 변경 기록을 보관하는 온라인 금고','☁️','저장과 배포','git 온라인 금고 저장소 repository main',[['한 줄 설명','프로그램 원본과 변경 기록을 인터넷에 보관하는 온라인 금고다.'],['왜 필요한가?','컴퓨터가 바뀌어도 원본을 다시 가져올 수 있고 무엇을 언제 바꿨는지 기록이 남는다.'],['중요한 말','Repository는 프로젝트 금고, main은 운영 중심 줄기, commit은 저장 시점의 기록이다.'],['GuideFlow에서는?','모든 변경을 GitHub에 저장했고 Vercel이 main의 최신 상태를 읽어 배포했다.'],['이것만 기억하자','GitHub = 코드와 변경 기록을 보관하는 온라인 금고']],['git','vercel','verified-work']],
['git','Git','변경 전 상태로 돌아갈 수 있게 기록하는 저장 역사','🕘','저장과 배포','버전 기록 커밋 되돌리기',[['한 줄 설명','파일이 어떻게 바뀌었는지 시간순으로 기록하는 도구다.'],['쉽게 비유하면','게임의 저장 지점을 여러 개 남겨 두는 것과 비슷하다.'],['GitHub와 차이','Git은 변경 기록 방식이고 GitHub는 그 기록과 파일을 인터넷에 보관하는 장소다.'],['이것만 기억하자','Git = 저장 역사, GitHub = 온라인 금고']],['github','verified-work']],

const app=document.querySelector('#app');let category='전체';const fav=new Set(JSON.parse(localStorage.getItem('wiki-fav')||'[]'));const cats=['전체','즐겨찾기',...new Set(docs.map(d=>d.category))];
function saveFav(){localStorage.setItem('wiki-fav',JSON.stringify([...fav]))}function toast(t){const e=document.createElement('div');e.className='toast';e.textContent=t;document.body.append(e);setTimeout(()=>e.remove(),1600)}function go(slug){location.hash=slug?'#/'+slug:'#/'}function copy(t){navigator.clipboard.writeText(t).then(()=>toast('복사했어')).catch(()=>toast('복사하지 못했어'))}
function home(){app.innerHTML=`<section class="hero"><div class="badge">개인 AI 개발 운영체제</div><h1>AI Development Wiki</h1><p>AI와 함께 프로그램을 만들며 배운 지식, 규칙, 프롬프트, 문제 해결 경험을 기록하고 다시 사용하는 개인 개발 위키</p><label class="search">🔎<input id="q" placeholder="예: GitHub, 버셀, 새 프로젝트, 빌드 오류"></label></section><section class="layout"><aside class="side"><h2>문서 분류</h2><div class="nav">${cats.map(c=>`<button data-cat="${c}" class="${c===category?'on':''}">${c}</button>`).join('')}</div><small>즐겨찾기는 이 기기에 저장돼. 중요한 문서는 별표를 눌러 모아둘 수 있어.</small></aside><div><div class="quick"><button data-go="start-here"><strong>🚩 새 프로젝트 시작</strong><span>다른 채팅의 GPT에게 전달할 문서</span></button><button data-go="prompt-library"><strong>💬 프롬프트 복사</strong><span>반복해서 쓰는 요청 문장</span></button><button data-go="project-checklist"><strong>✅ 체크리스트</strong><span>프로젝트 시작 순서 확인</span></button></div><div class="head"><div><p class="eye">KNOWLEDGE BASE</p><h2 id="heading">지식 둘러보기</h2></div><span id="count"></span></div><div class="grid" id="grid"></div><div id="empty" class="empty" hidden>검색 결과가 없어. 새 프로젝트에서 배우는 내용을 계속 추가하자.</div></div></section><footer>GitHub에 기록하고 Vercel로 배포하는 살아 있는 개발 백과사전</footer>`;const q=document.querySelector('#q'),grid=document.querySelector('#grid'),count=document.querySelector('#count'),heading=document.querySelector('#heading'),empty=document.querySelector('#empty');function render(){const s=q.value.trim().toLowerCase();let list=docs.filter(d=>(category==='전체'||d.category===category||(category==='즐겨찾기'&&fav.has(d.slug)))&&[d.title,d.description,d.category,d.keywords,...d.sections.flat()].join(' ').toLowerCase().includes(s));grid.innerHTML=list.map(d=>`<button class="card" data-go="${d.slug}"><span class="ico">${d.icon}</span><span><p class="cat">${d.category}</p><h3>${d.title}</h3><p>${d.description}</p></span><span class="star ${fav.has(d.slug)?'on':''}" data-star="${d.slug}">★</span></button>`).join('');count.textContent=list.length+'개 문서';heading.textContent=s?'“'+q.value.trim()+'” 검색 결과':category==='전체'?'지식 둘러보기':category;empty.hidden=!!list.length}q.oninput=render;document.querySelectorAll('[data-cat]').forEach(b=>b.onclick=()=>{category=b.dataset.cat;home()});document.querySelectorAll('[data-go]').forEach(b=>b.onclick=()=>go(b.dataset.go));grid.onclick=e=>{const s=e.target.closest('[data-star]');if(s){e.stopPropagation();fav.has(s.dataset.star)?fav.delete(s.dataset.star):fav.add(s.dataset.star);saveFav();render();return}const c=e.target.closest('[data-go]');if(c)go(c.dataset.go)};render()}
function doc(slug){const d=docs.find(x=>x.slug===slug);if(!d)return home();app.innerHTML=`<section class="doc"><div class="top"><button class="small" id="back">← 뒤로</button><div class="group"><button class="small" id="favorite">${fav.has(d.slug)?'★ 즐겨찾기 해제':'☆ 즐겨찾기'}</button><button class="small" id="share">주소 복사</button><button class="small" id="home">홈</button></div></div><header class="dh"><div class="meta"><span class="dico">${d.icon}</span><strong style="color:#9da8ff">${d.category}</strong></div><h1>${d.title}</h1><p>${d.description}</p></header><div>${d.sections.map(([h,t])=>{const isPrompt=t.startsWith('PROMPT::'),text=isPrompt?t.slice(8):t;return `<section class="sec ${h.includes('기억')?'memory':''}"><h2>${h}</h2>${isPrompt?`<div class="prompt">${text}</div><div class="copy"><button class="small" data-copy="${encodeURIComponent(text)}">문장 복사</button></div>`:`<p>${text.replace(/\n/g,'<br>')}</p>`}</section>`}).join('')}<section class="sec"><h2>관련 문서</h2><div class="related">${d.related.map(s=>{const r=docs.find(x=>x.slug===s);return r?`<button data-go="${s}">${r.title}</button>`:''}).join('')}</div></section></div></section>`;document.querySelector('#back').onclick=()=>history.length>1?history.back():go();document.querySelector('#home').onclick=()=>go();document.querySelector('#share').onclick=()=>copy(location.href);document.querySelector('#favorite').onclick=()=>{fav.has(d.slug)?fav.delete(d.slug):fav.add(d.slug);saveFav();doc(d.slug)};document.querySelectorAll('[data-go]').forEach(b=>b.onclick=()=>go(b.dataset.go));document.querySelectorAll('[data-copy]').forEach(b=>b.onclick=()=>copy(decodeURIComponent(b.dataset.copy)))}
function route(){const slug=location.hash.replace(/^#\//,'');slug?doc(slug):home();scrollTo(0,0)}addEventListener('hashchange',route);route();
</script></body></html>

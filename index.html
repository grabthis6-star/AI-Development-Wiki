<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="AI와 함께 프로그램을 만드는 지식을 기록하는 개인 개발 위키" />
  <title>AI Development Wiki</title>
  <style>
    :root{font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#eef2ff;background:#080b14;font-synthesis:none}*{box-sizing:border-box}body{margin:0;min-width:320px;min-height:100vh;background:radial-gradient(circle at top,#17203b 0,#0b1020 35%,#080b14 75%);color:#eef2ff}button,input{font:inherit}main{min-height:100vh}.hero{padding:72px 24px 44px;text-align:center;max-width:980px;margin:0 auto}.badge{display:inline-flex;padding:8px 12px;border:1px solid rgba(165,180,252,.28);border-radius:999px;background:rgba(99,102,241,.12);color:#c7d2fe;font-weight:700;font-size:14px}.hero h1{margin:22px 0 14px;font-size:clamp(40px,8vw,76px);line-height:1;letter-spacing:-.04em}.hero>p{max-width:720px;margin:0 auto;color:#aab3c7;font-size:clamp(17px,2vw,21px);line-height:1.65}.search-box{margin:34px auto 0;max-width:720px;height:62px;padding:0 20px;display:flex;align-items:center;gap:12px;border:1px solid rgba(148,163,184,.24);border-radius:18px;background:rgba(15,23,42,.82);box-shadow:0 20px 60px rgba(0,0,0,.28)}.search-box input{width:100%;border:0;outline:0;background:transparent;color:#fff;font-size:17px}.search-box input::placeholder{color:#7d879d}.content{max-width:1120px;margin:0 auto;padding:24px 24px 72px}.section-heading{display:flex;align-items:end;justify-content:space-between;gap:20px;margin-bottom:24px}.eyebrow{margin:0 0 6px;color:#818cf8;font-size:12px;font-weight:800;letter-spacing:.16em}.section-heading h2{margin:0;font-size:30px}.section-heading>span{color:#94a3b8}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}.card{width:100%;display:flex;gap:16px;min-height:170px;padding:24px;text-align:left;color:inherit;border:1px solid rgba(148,163,184,.16);border-radius:20px;background:linear-gradient(145deg,rgba(30,41,59,.8),rgba(15,23,42,.72));box-shadow:0 18px 40px rgba(0,0,0,.16);cursor:pointer;transition:.2s transform,.2s border-color,.2s background}.card:hover,.card:focus-visible{transform:translateY(-3px);border-color:rgba(129,140,248,.7);background:linear-gradient(145deg,rgba(39,51,78,.9),rgba(18,27,49,.82));outline:none}.card-icon{display:grid;place-items:center;flex:0 0 50px;height:50px;border-radius:14px;background:rgba(99,102,241,.15);font-size:25px}.category{margin:1px 0 8px!important;color:#818cf8!important;font-size:13px;font-weight:800}.card h3{margin:0 0 10px;font-size:22px}.card p{margin:0;color:#9da8bd;line-height:1.65}.empty-state{padding:50px;text-align:center;border:1px dashed rgba(148,163,184,.28);border-radius:20px;color:#aab3c7}.empty-state strong{display:block;color:#fff;font-size:22px;margin-bottom:8px}.document-shell{max-width:900px;margin:0 auto;padding:42px 24px 80px}.topbar{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:36px}.back-button,.home-link{border:1px solid rgba(148,163,184,.2);border-radius:12px;background:rgba(15,23,42,.72);color:#dbe4ff;padding:11px 15px;cursor:pointer}.back-button:hover,.home-link:hover{border-color:rgba(129,140,248,.65)}.doc-header{padding:36px;border:1px solid rgba(148,163,184,.16);border-radius:24px;background:linear-gradient(145deg,rgba(30,41,59,.82),rgba(15,23,42,.74));box-shadow:0 24px 70px rgba(0,0,0,.22)}.doc-meta{display:flex;align-items:center;gap:14px;margin-bottom:18px}.doc-icon{display:grid;place-items:center;width:54px;height:54px;border-radius:15px;background:rgba(99,102,241,.16);font-size:27px}.doc-category{color:#9da8ff;font-weight:800}.doc-header h1{margin:0 0 14px;font-size:clamp(36px,7vw,62px);line-height:1.04;letter-spacing:-.035em}.doc-summary{margin:0;color:#aeb8cc;font-size:19px;line-height:1.7}.doc-body{padding:12px 6px}.doc-section{margin-top:34px;padding:28px;border:1px solid rgba(148,163,184,.13);border-radius:18px;background:rgba(15,23,42,.56)}.doc-section h2{margin:0 0 14px;font-size:24px}.doc-section p{margin:0;color:#b2bdd0;font-size:17px;line-height:1.8}.memory-line{border-color:rgba(129,140,248,.45);background:rgba(79,70,229,.13)}.memory-line p{color:#eef2ff;font-size:19px;font-weight:750}.related{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px}.related button{padding:9px 13px;border:1px solid rgba(129,140,248,.3);border-radius:999px;background:rgba(99,102,241,.1);color:#c7d2fe;cursor:pointer}footer{padding:24px;text-align:center;border-top:1px solid rgba(148,163,184,.12);color:#7f8aa0}@media(max-width:720px){.hero{padding-top:52px}.grid{grid-template-columns:1fr}.section-heading{align-items:start;flex-direction:column}.card{min-height:0}.search-box{height:58px}.doc-header{padding:26px}.doc-section{padding:22px}.topbar{align-items:stretch;flex-direction:column}.topbar button{width:100%}}
  </style>
</head>
<body>
  <main id="app"></main>
  <script>
    const items=[
      {slug:'start-here',title:'처음 시작하기',description:'새 프로젝트를 시작할 때 GPT가 가장 먼저 읽는 안내서',icon:'🚩',category:'시작하기',keywords:'start here 프로젝트 시작 규칙',sections:[['한 줄 설명','새로운 프로그램을 시작할 때 사람과 AI가 같은 방식으로 일하도록 기준을 알려주는 출발 문서다.'],['왜 필요한가?','새 채팅은 이전 채팅의 모든 상황을 자동으로 아는 것이 아니다. 이 문서를 먼저 읽게 하면 사용자의 수준, 작업 방식, 저장과 배포 규칙을 빠르게 맞출 수 있다.'],['새 프로젝트에서는?','이 문서 주소와 만들 프로그램의 목적을 한두 문장으로 전달한다. AI는 한 번에 기능 하나를 만들고, 실제 사이트에서 확인한 뒤 다음 기능으로 넘어간다.'],['이것만 기억하자','새 프로젝트 시작 = 이 문서를 먼저 읽히고 목적을 짧게 설명하기']],related:['ai-collaboration','github','vercel']},
      {slug:'ai-collaboration',title:'AI와 협업하기',description:'기능을 하나씩 만들고 실제 사이트에서 확인하는 작업 방식',icon:'🤖',category:'AI 협업',keywords:'chatgpt 프롬프트 협업',sections:[['한 줄 설명','AI에게 한꺼번에 모든 것을 맡기지 않고 작은 기능 단위로 함께 만드는 방법이다.'],['왜 필요한가?','변경이 작을수록 문제가 생겼을 때 원인을 찾기 쉽고, 사용자가 원하는 방향과 실제 결과가 어긋나는 일을 줄일 수 있다.'],['GuideFlow에서는?','기능 하나를 구현하고 GitHub에 기록한 뒤 Vercel의 실제 사이트에서 테스트했다. 확인이 끝난 뒤에만 다음 기능을 진행했다.'],['이것만 기억하자','기능 하나 → 실제 테스트 → 확인 → 다음 기능']],related:['start-here','github','vercel']},
      {slug:'vscode',title:'VS Code',description:'프로그램을 만들고 고치는 작업실',icon:'💻',category:'개발환경',keywords:'에디터 작업실 코드',sections:[['한 줄 설명','프로그램 파일을 열고 작성하고 고치는 작업실이다.'],['왜 필요한가?','여러 파일을 한곳에서 보고, 코드를 수정하고, 명령어를 실행할 수 있기 때문이다.'],['쉽게 비유하면','목공 일을 할 때 쓰는 작업대와 공구함을 합친 공간과 비슷하다.'],['GuideFlow에서는?','프로젝트 파일을 확인하고 직접 수정해야 할 때 사용하는 기본 작업 공간이었다.'],['이것만 기억하자','VS Code = 프로그램을 만드는 작업실']],related:['nodejs','github']},
      {slug:'nodejs',title:'Node.js',description:'개발 도구를 움직이는 엔진',icon:'⚙️',category:'개발환경',keywords:'node 엔진 실행',sections:[['한 줄 설명','컴퓨터에서 개발 도구와 자바스크립트 프로그램을 실행하게 해주는 엔진이다.'],['왜 필요한가?','Vite 같은 개발 도구를 실행하고 프로그램을 완성된 웹사이트 파일로 만들기 위해 필요하다.'],['쉽게 비유하면','자동차가 움직이려면 엔진이 필요한 것처럼 개발 도구가 움직이려면 Node.js가 필요하다.'],['GuideFlow에서는?','프로젝트 실행과 빌드에 사용됐다.'],['이것만 기억하자','Node.js = 개발 도구를 움직이는 엔진']],related:['vscode','github','vercel']},
      {slug:'github',title:'GitHub',description:'코드와 변경 기록을 보관하는 온라인 금고',icon:'☁️',category:'저장과 배포',keywords:'git 온라인 금고 저장소',sections:[['한 줄 설명','프로그램 원본과 변경 기록을 인터넷에 안전하게 보관하는 온라인 금고다.'],['왜 필요한가?','컴퓨터가 바뀌어도 코드를 다시 가져올 수 있고, 언제 무엇을 바꿨는지 기록이 남는다.'],['GuideFlow에서는?','모든 코드 변경을 main 브랜치에 보관했고 Vercel이 그 변경을 읽어 자동으로 배포했다.'],['이것만 기억하자','GitHub = 코드와 변경 기록을 보관하는 온라인 금고']],related:['vercel','ai-collaboration']},
      {slug:'vercel',title:'Vercel',description:'GitHub의 최신 코드를 웹사이트로 자동 배포하는 서비스',icon:'🚀',category:'저장과 배포',keywords:'버셀 배포 사이트 주소',sections:[['한 줄 설명','GitHub에 저장된 프로그램을 사람들이 접속할 수 있는 웹사이트로 만들어 주는 서비스다.'],['왜 필요한가?','코드가 바뀔 때마다 직접 서버에 올리지 않아도 자동으로 새 버전을 공개할 수 있다.'],['GuideFlow에서는?','main 브랜치가 바뀔 때마다 자동으로 새 버전을 만들고 실제 주소에 반영했다.'],['이것만 기억하자','Vercel = GitHub의 코드를 웹사이트로 자동 공개하는 배포 서비스']],related:['github','nodejs']},
      {slug:'troubleshooting',title:'문제 해결 기록',description:'실패 원인과 해결 방법을 다음 프로젝트에서도 재사용하는 공간',icon:'🧰',category:'문제 해결',keywords:'오류 버그 해결',sections:[['한 줄 설명','문제가 생긴 현상, 원인, 해결법을 다음에도 다시 쓸 수 있도록 기록하는 공간이다.'],['왜 필요한가?','같은 문제를 반복해서 처음부터 조사하는 시간을 줄여준다.'],['기록 방법','문제 현상 → 시도한 것 → 실제 원인 → 해결 방법 → 다음에 확인할 체크리스트 순서로 남긴다.'],['이것만 기억하자','해결만 하지 말고 다음의 나를 위해 기록하기']],related:['guideflow-case','ai-collaboration']},
      {slug:'guideflow-case',title:'GuideFlow 사례',description:'GuideFlow를 만들며 배운 실제 개발 경험',icon:'🎬',category:'실전 사례',keywords:'guideflow 사례 스토리보드',sections:[['한 줄 설명','GuideFlow를 실제로 만들면서 겪은 결정과 문제 해결 과정을 모은 사례집이다.'],['왜 필요한가?','이론이 아니라 실제 프로젝트에서 무엇이 효과가 있었는지 확인할 수 있다.'],['핵심 작업 방식','GitHub에 원본을 저장하고 Vercel로 배포하며, 기능 하나씩 구현하고 실제 사이트에서 검증했다.'],['이것만 기억하자','실전 사례는 다음 프로젝트의 출발점을 높여준다.']],related:['ai-collaboration','troubleshooting','github']}
    ];
    const app=document.querySelector('#app');
    const findItem=slug=>items.find(item=>item.slug===slug);
    function go(slug){location.hash=slug?`/${slug}`:'';window.scrollTo({top:0,behavior:'smooth'});}
    function renderHome(){document.title='AI Development Wiki';app.innerHTML=`<header class="hero"><div class="badge">개인 AI 개발 운영체제</div><h1>AI Development Wiki</h1><p>AI와 함께 프로그램을 만들며 배운 모든 것을 기록하고 다시 사용하는 개인 개발 위키</p><label class="search-box"><span>🔎</span><input id="search" placeholder="무엇을 찾고 싶나요? 예: GitHub, 버셀, Node" aria-label="위키 검색" /></label></header><section class="content"><div class="section-heading"><div><p class="eyebrow">KNOWLEDGE BASE</p><h2 id="heading">지식 둘러보기</h2></div><span id="count"></span></div><div class="grid" id="grid"></div><div class="empty-state" id="empty" hidden><strong>아직 해당 문서가 없어.</strong><p>앞으로 새 프로젝트를 진행하면서 관련 내용을 계속 추가할 거야.</p></div></section><footer>GitHub에 기록하고 Vercel로 배포하는 살아 있는 개발 백과사전</footer>`;
      const grid=document.querySelector('#grid'),search=document.querySelector('#search'),count=document.querySelector('#count'),heading=document.querySelector('#heading'),empty=document.querySelector('#empty');
      function renderCards(){const q=search.value.trim().toLowerCase();const filtered=items.filter(i=>[i.title,i.description,i.category,i.keywords,...i.sections.flat()].join(' ').toLowerCase().includes(q));grid.innerHTML=filtered.map(i=>`<button class="card" data-slug="${i.slug}"><div class="card-icon">${i.icon}</div><div><p class="category">${i.category}</p><h3>${i.title}</h3><p>${i.description}</p></div></button>`).join('');count.textContent=`${filtered.length}개 문서`;heading.textContent=q?`“${search.value.trim()}” 검색 결과`:'지식 둘러보기';empty.hidden=filtered.length!==0;grid.querySelectorAll('[data-slug]').forEach(button=>button.addEventListener('click',()=>go(button.dataset.slug)));}
      search.addEventListener('input',renderCards);renderCards();
    }
    function renderDocument(item){document.title=`${item.title} | AI Development Wiki`;app.innerHTML=`<section class="document-shell"><div class="topbar"><button class="back-button" id="back">← 뒤로 가기</button><button class="home-link" id="home">AI Development Wiki 홈</button></div><article><header class="doc-header"><div class="doc-meta"><div class="doc-icon">${item.icon}</div><div class="doc-category">${item.category}</div></div><h1>${item.title}</h1><p class="doc-summary">${item.description}</p></header><div class="doc-body">${item.sections.map((section,index)=>`<section class="doc-section ${index===item.sections.length-1?'memory-line':''}"><h2>${section[0]}</h2><p>${section[1]}</p></section>`).join('')}<section class="doc-section"><h2>관련 문서</h2><p>함께 읽으면 이해가 더 쉬운 문서</p><div class="related">${item.related.map(slug=>{const related=findItem(slug);return related?`<button data-related="${slug}">${related.icon} ${related.title}</button>`:''}).join('')}</div></section></div></article></section>`;document.querySelector('#back').addEventListener('click',()=>history.length>1?history.back():go(''));document.querySelector('#home').addEventListener('click',()=>go(''));document.querySelectorAll('[data-related]').forEach(button=>button.addEventListener('click',()=>go(button.dataset.related)));}
    function route(){const slug=location.hash.replace(/^#\/?/,'');const item=findItem(slug);item?renderDocument(item):renderHome();}
    window.addEventListener('hashchange',route);route();
  </script>
</body>
</html>

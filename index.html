<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="GuideFlow 제작 경험으로 배우는 초보자용 AI 프로그램 제작 가이드">
  <title>GuideFlow Knowledge Base</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="wrap">
    <header class="top">
      <button class="brand" data-route="home" aria-label="GuideFlow Knowledge Base 처음 화면">
        <span class="logo">⚡</span>
        <span>GuideFlow Knowledge Base</span>
      </button>
      <nav class="nav section-tabs" aria-label="주요 메뉴">
        <button data-route="context" data-tab="context">Start Here</button>
        <button data-route="ai" data-tab="ai">AI와 만들기</button>
        <button data-route="tech" data-tab="tech">GuideFlow 기술</button>
        <button data-route="tools" data-tab="reference">참고 자료</button>
      </nav>
    </header>
    <div id="app"></div>
  </main>
  <nav class="mobile-nav" aria-label="모바일 주요 메뉴">
    <button data-route="home">처음</button>
    <button data-route="context">시작</button>
    <button data-route="ai">만들기</button>
    <button data-route="tech">기술</button>
  </nav>
  <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>
  <script type="module" src="./app.js"></script>
</body>
</html>

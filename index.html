<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="description" content="GuideFlow 개발 기술과 AI 협업 노하우를 정리한 실전 위키">
<title>AI Development Wiki</title>
<style>
:root{font-family:Inter,Pretendard,system-ui,sans-serif;color:#172033;background:#f6f7fb;--muted:#667085;--line:#dde3ed;--panel:#fff;--blue:#3157d5;--green:#15785a}*{box-sizing:border-box}body{margin:0;min-width:320px;background:#f6f7fb}button,a,input{font:inherit}.wrap{max-width:1120px;margin:auto;padding:0 22px 72px}.top{min-height:70px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line);gap:16px}.brand{font-weight:900;display:flex;align-items:center;gap:10px}.brand span{width:35px;height:35px;display:grid;place-items:center;border-radius:10px;background:#172033;color:#fff}.nav{display:flex;gap:6px;flex-wrap:wrap}.nav button{border:0;background:transparent;padding:9px 11px;border-radius:9px;color:var(--muted);cursor:pointer}.nav button:hover,.nav button.on{background:#e8ecf3;color:#172033}.hero{padding:62px 0 30px}.eyebrow{margin:0 0 11px;color:var(--blue);font-size:12px;font-weight:900;letter-spacing:.14em}.hero h1{margin:0;font-size:clamp(38px,7vw,68px);line-height:1.07;letter-spacing:-.05em}.hero>p{max-width:760px;margin:20px 0 0;color:var(--muted);font-size:18px;line-height:1.75}.context{margin:14px 0 24px;padding:27px;border:1px solid #bdcaff;border-radius:22px;background:linear-gradient(135deg,#edf1ff,#fff);display:grid;grid-template-columns:1fr auto;gap:22px;align-items:center}.context h2{margin:5px 0 10px;font-size:29px}.context p{margin:0;color:#536079;line-height:1.7}.actions{display:flex;gap:9px;flex-wrap:wrap;justify-content:flex-end}.btn{display:inline-flex;align-items:center;justify-content:center;padding:12px 15px;border-radius:11px;border:1px solid #cbd3e3;background:#fff;color:#172033;text-decoration:none;font-weight:800;cursor:pointer}.btn.primary{border-color:var(--blue);background:var(--blue);color:#fff}.two{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:18px}.choice{padding:25px;border:1px solid var(--line);border-radius:19px;background:#fff;text-align:left;cursor:pointer}.choice:hover{border-color:#aeb9d5}.choice .icon{font-size:31px}.choice h2{margin:16px 0 8px;font-size:25px}.choice p{margin:0;color:var(--muted);line-height:1.65}.choice strong{display:block;margin-top:20px;color:var(--blue)}.choice.ai strong{color:var(--green)}.section{margin-top:38px}.section-head{display:flex;justify-content:space-between;align-items:end;gap:18px;margin-bottom:15px}.section-head h2{margin:4px 0 0;font-size:29px}.section-head p{margin:7px 0 0;color:var(--muted)}.search{height:53px;display:flex;align-items:center;gap:10px;padding:0 16px;border:1px solid var(--line);border-radius:14px;background:#fff;margin-bottom:14px}.search input{width:100%;border:0;outline:0;background:transparent}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:13px}.card{padding:21px;border:1px solid var(--line);border-radius:16px;background:#fff;text-align:left;cursor:pointer}.card:hover{border-color:#aeb9d5}.meta{display:flex;justify-content:space-between;margin-bottom:13px}.badge{padding:5px 8px;border-radius:999px;background:#eef2ff;color:var(--blue);font-size:11px;font-weight:900}.badge.ai{background:#eaf8f2;color:var(--green)}.card h3{margin:0 0 7px;font-size:20px}.card p{margin:0;color:var(--muted);line-height:1.55}.doc{max-width:850px;margin:38px auto}.back{border:0;background:transparent;color:var(--muted);padding:9px 0;cursor:pointer}.doc-head,.block{padding:27px;border:1px solid var(--line);border-radius:18px;background:#fff}.doc-head{margin-top:12px}.doc-head .icon{font-size:37px}.doc-head h1{margin:13px 0 10px;font-size:clamp(35px,6vw,55px);letter-spacing:-.04em}.doc-head p,.block p,.block li{color:#4e5b72;line-height:1.8}.block{margin-top:14px}.block h2{margin:0 0 10px;font-size:21px}.code{white-space:pre-wrap;padding:16px;border-radius:12px;background:#111827;color:#e5e7eb;overflow:auto;line-height:1.65}.empty{padding:35px;border:1px dashed var(--line);border-radius:15px;text-align:center;color:var(--muted)}.toast{position:fixed;right:18px;bottom:18px;padding:12px 15px;border-radius:10px;background:#172033;color:#fff;font-weight:800}@media(max-width:760px){.top{align-items:flex-start;padding:14px 0}.context{grid-template-columns:1fr}.actions{justify-content:flex-start}.two,.grid{grid-template-columns:1fr}.hero{padding-top:48px}.section-head{align-items:flex-start;flex-direction:column}}
</style>
</head>
<body><main id="app"></main>
<script>
const docs=[
{id:'pointer-event',type:'tech',icon:'👆',title:'Pointer Event',summary:'마우스와 터치를 하나의 방식으로 처리하는 입력 기술',sections:[['이 기술이 무엇인가요?','마우스 클릭, 손가락 터치, 펜 입력을 하나의 이벤트 체계로 처리하는 브라우저 기술입니다.'],['왜 GuideFlow에 필요했나요?','이미지와 화면 요소를 PC와 모바일에서 모두 움직일 수 있어야 했기 때문입니다.'],['어디에 사용했나요?',['이미지 드래그','장면 안 요소 선택','PC와 모바일 입력 통합']],['쉽게 비유하면','마우스용 리모컨과 터치용 리모컨을 따로 만들지 않고 공용 리모컨 하나를 사용하는 것과 같습니다.'],['다른 프로그램에서는?','칸반 보드, 이미지 편집기, 지도, 슬라이더처럼 사용자가 화면 요소를 직접 움직이는 기능에 재사용할 수 있습니다.']]},
{id:'scene-number',type:'tech',icon:'🔢',title:'장면 번호와 고유 ID',summary:'보이는 순서와 내부 식별자를 분리해 장면을 안전하게 관리하는 방법',sections:[['이 기술이 무엇인가요?','화면에 보이는 1번, 2번 같은 순서와 데이터 내부의 고유 ID를 서로 다르게 관리하는 방식입니다.'],['왜 GuideFlow에 필요했나요?','장면을 복제하거나 삭제해도 다른 장면을 잘못 선택하지 않도록 하기 위해서입니다.'],['쉽게 비유하면','책의 페이지 번호는 바뀔 수 있지만 각 원고의 관리 번호는 유지되는 것과 같습니다.'],['다른 프로그램에서는?','슬라이드 편집기, 설문 제작 도구, 강의 목차, 영상 장면 관리에 적용할 수 있습니다.']]},
{id:'image-replace',type:'tech',icon:'🖼️',title:'이미지 교체',summary:'위치와 크기는 유지하고 이미지 내용만 바꾸는 방식',sections:[['이 기술이 무엇인가요?','현재 이미지 요소를 새로 만들지 않고 이미지 주소만 변경하는 기능입니다.'],['왜 GuideFlow에 필요했나요?','이미지의 위치와 크기를 다시 맞추지 않고 사진만 바꿀 수 있어야 했기 때문입니다.'],['쉽게 비유하면','액자는 그대로 두고 안의 사진만 바꾸는 것과 같습니다.'],['주의할 점','교체 전에 현재 선택된 이미지가 맞는지 확인해야 합니다.'],['다른 프로그램에서는?','프로필 사진, 상품 이미지, 카드 뉴스, 문서 첨부 이미지 교체에 사용할 수 있습니다.']]},
{id:'local-storage',type:'tech',icon:'💾',title:'LocalStorage',summary:'새로고침 후에도 작은 상태를 유지하는 브라우저 저장 공간',sections:[['이 기술이 무엇인가요?','브라우저 안에 문자열 형태의 데이터를 저장하는 간단한 공간입니다.'],['왜 GuideFlow에 필요했나요?','일부 설정이나 최근 작업 상태를 유지하는 데 사용할 수 있기 때문입니다.'],['주의할 점','큰 이미지나 중요한 영구 데이터에는 적합하지 않습니다.'],['다른 프로그램에서는?','최근 본 문서, 테마, 간단한 임시 작성 내용을 저장할 때 사용할 수 있습니다.']]},
{id:'github',type:'tech',icon:'🐙',title:'GitHub',summary:'원본 코드와 모든 변경 기록을 저장하는 공간',sections:[['왜 사용했나요?','코드 원본을 보관하고 수정 이력을 남기며 Vercel 배포의 원본으로 사용했습니다.'],['쉽게 비유하면','프로그램 파일을 보관하는 클라우드이면서 모든 수정 기록이 남는 작업 일지입니다.'],['중요한 원칙','GitHub에 코드가 반영된 것과 실제 사이트가 정상 동작하는 것은 서로 다른 확인 단계입니다.']]},
{id:'vercel',type:'tech',icon:'▲',title:'Vercel',summary:'GitHub의 웹 프로젝트를 실제 인터넷 주소로 배포하는 서비스',sections:[['왜 사용했나요?','컴퓨터 안의 코드가 아니라 실제 사용자가 접속하는 결과물을 확인하기 위해 사용했습니다.'],['중요한 원칙','배포 성공 상태와 브라우저에서 기능이 정상 동작하는지는 구분해야 합니다.']]},
{id:'small-steps',type:'ai',icon:'🧩',title:'작업을 작게 나누기',summary:'큰 요청을 확인 가능한 작은 기능으로 나누는 협업 방식',sections:[['왜 필요한가요?','한 번에 많은 것을 바꾸면 오류 원인과 깨진 기능을 찾기 어려워집니다.'],['좋은 방식','기능 하나 정의 → 구현 → GitHub 확인 → 배포 확인 → 사용자 테스트 → 다음 기능 순서로 진행합니다.'],['재사용 문장','CODE::한 번에 전체를 다시 만들지 말고, 지금 확인할 수 있는 기능 하나만 수정해.']]},
{id:'protect-existing',type:'ai',icon:'🛡️',title:'기존 기능 보호하기',summary:'새 기능을 추가하면서 이미 되던 기능을 깨뜨리지 않는 요청 방법',sections:[['좋은 요청','수정 범위와 함께 반드시 유지해야 할 기존 동작을 적습니다.'],['재사용 문장','CODE::아래 기능 하나만 추가해. 기존의 장면 추가, 삭제, 이미지 이동 기능은 변경하지 마. 관련 파일을 먼저 확인한 뒤 가장 작은 수정으로 처리해.']]},
{id:'verify-work',type:'ai',icon:'✅',title:'구현과 검증 구분하기',summary:'코드 작성, 커밋, 배포, 브라우저 확인을 별도 단계로 보고하는 원칙',sections:[['네 단계','구현됨 / GitHub 커밋 확인됨 / 배포 확인됨 / 브라우저 동작 확인됨을 각각 구분합니다.'],['재사용 문장','CODE::GitHub 반영, 배포 성공, 브라우저 동작 확인을 구분해서 보고해. 직접 확인하지 못한 내용은 완료됐다고 말하지 마.']]},
{id:'debug-request',type:'ai',icon:'🔧',title:'오류 수정 요청하기',summary:'증상과 기대 결과를 비교해 추측이 아닌 확인으로 고치게 하는 방법',sections:[['필요한 정보',['현재 보이는 현상','기대 결과','문제가 생기는 클릭 순서','최근 변경']],['재사용 문장','CODE::추측으로 수정하지 말고 관련 코드를 먼저 확인해. 원인을 설명한 뒤 가장 작은 수정만 적용하고, 내가 직접 확인할 테스트 순서도 알려줘.']]}
];
let mode='home',filter='all',query='';
const app=document.querySelector('#app');
const contextPrompt=`첨부한 GUIDEFLOW_CONTEXT.md를 먼저 읽고 그 규칙을 작업 기준으로 사용해.\n나는 비개발자이므로 쉬운 말로 설명해.\n요청 범위를 임의로 확대하지 말고 작은 단위로 구현해.\nGitHub 반영, 배포 성공, 브라우저 동작 확인을 서로 구분해서 보고해.\n확인하지 못한 내용은 완료됐다고 말하지 마.\n\n이번에 만들 프로그램의 목적:\n[여기에 한두 문장으로 작성]\n\n지금 가장 먼저 만들 기능:\n[기능 하나만 작성]`;
function nav(){return `<header class="top"><div class="brand"><span>⚡</span>AI Development Wiki</div><nav class="nav"><button data-home class="${mode==='home'?'on':''}">홈</button><button data-filter="tech">GuideFlow 개발 기술</button><button data-filter="ai">AI 협업 노하우</button></nav></header>`}
function cards(){const list=docs.filter(d=>(filter==='all'||d.type===filter)&&(`${d.title} ${d.summary}`.toLowerCase().includes(query.toLowerCase())));return list.length?list.map(d=>`<button class="card" data-doc="${d.id}"><div class="meta"><span>${d.icon}</span><span class="badge ${d.type==='ai'?'ai':''}">${d.type==='tech'?'GUIDEFLOW 기술':'AI 협업'}</span></div><h3>${d.title}</h3><p>${d.summary}</p></button>`).join(''):'<div class="empty">검색 결과가 없습니다.</div>'}
function home(){return `<div class="wrap">${nav()}<section class="hero"><p class="eyebrow">GUIDEFLOW KNOWLEDGE BASE</p><h1>GuideFlow에서 배운 기술과<br>AI 협업 방법만 정리합니다.</h1><p>기술 이름만 모으는 곳이 아닙니다. 왜 사용했고, 어디에 사용했고, 다음 프로그램에서 어떻게 재사용할 수 있는지 초보자도 이해할 수 있게 기록합니다.</p></section><section class="context"><div><p class="eyebrow">START HERE · GPT ATTACHMENT</p><h2>GuideFlow 전체 개발 컨텍스트</h2><p>새 GPT나 새 채팅에 이 문서 하나를 첨부하면, GuideFlow를 만들며 정한 개발 방식·핵심 기술·검증 원칙·AI 요청 방법을 다시 설명하지 않아도 됩니다.</p></div><div class="actions"><button class="btn" data-copy>시작 문장 복사</button><a class="btn primary" href="./GUIDEFLOW_CONTEXT.md" download>문서 첨부용 저장</a></div></section><section class="two"><button class="choice" data-filter="tech"><span class="icon">📘</span><h2>GuideFlow 개발 기술</h2><p>GuideFlow에 실제로 필요했던 기술과 사용 이유, 적용 위치, 재사용 방법을 설명합니다.</p><strong>기술 문서 보기 →</strong></button><button class="choice ai" data-filter="ai"><span class="icon">🤖</span><h2>AI 협업 노하우</h2><p>다음 프로그램에서도 그대로 적용할 수 있는 요청, 수정, 검증, 기록 방식을 정리합니다.</p><strong>협업 노하우 보기 →</strong></button></section><section class="section"><div class="section-head"><div><p class="eyebrow">DOCUMENTS</p><h2>${filter==='tech'?'GuideFlow 개발 기술':filter==='ai'?'AI 협업 노하우':'전체 문서'}</h2><p>필요한 문서만 검색해서 바로 확인할 수 있습니다.</p></div></div><label class="search">⌕<input id="q" value="${query}" placeholder="기술이나 협업 방법 검색"></label><div class="grid" id="grid">${cards()}</div></section></div>`}
function docView(id){const d=docs.find(x=>x.id===id);if(!d)return;return `<div class="wrap">${nav()}<article class="doc"><button class="back" data-home>← 홈으로</button><header class="doc-head"><span class="icon">${d.icon}</span><p class="eyebrow">${d.type==='tech'?'GUIDEFLOW DEVELOPMENT':'AI COLLABORATION'}</p><h1>${d.title}</h1><p>${d.summary}</p></header>${d.sections.map(([title,body])=>`<section class="block"><h2>${title}</h2>${Array.isArray(body)?`<ul>${body.map(x=>`<li>${x}</li>`).join('')}</ul>`:body.startsWith('CODE::')?`<pre class="code">${body.slice(6)}</pre>`:`<p>${body}</p>`}</section>`).join('')}</article></div>`}
function render(){app.innerHTML=mode==='home'?home():docView(mode);bind()}
function bind(){document.querySelectorAll('[data-home]').forEach(x=>x.onclick=()=>{mode='home';filter='all';render();scrollTo(0,0)});document.querySelectorAll('[data-filter]').forEach(x=>x.onclick=()=>{mode='home';filter=x.dataset.filter;render();setTimeout(()=>document.querySelector('.section')?.scrollIntoView({behavior:'smooth'}),0)});document.querySelectorAll('[data-doc]').forEach(x=>x.onclick=()=>{mode=x.dataset.doc;render();scrollTo(0,0)});const q=document.querySelector('#q');if(q)q.oninput=e=>{query=e.target.value;document.querySelector('#grid').innerHTML=cards();document.querySelectorAll('[data-doc]').forEach(x=>x.onclick=()=>{mode=x.dataset.doc;render();scrollTo(0,0)})};const copy=document.querySelector('[data-copy]');if(copy)copy.onclick=async()=>{await navigator.clipboard.writeText(contextPrompt);const t=document.createElement('div');t.className='toast';t.textContent='새 채팅 시작 문장을 복사했습니다.';document.body.append(t);setTimeout(()=>t.remove(),1800)}}
render();
</script>
</body>
</html>

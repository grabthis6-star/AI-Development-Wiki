<title>AI Development Wiki</title>
<style>
:root{font-family:Inter,Pretendard,system-ui,sans-serif;color:#172033;background:#f6f7fb;--ink:#172033;--muted:#657087;--line:#dde2ec;--panel:#fff;--blue:#3457d5;--blue2:#eef2ff;--green:#147a5a;--green2:#eaf8f2}*{box-sizing:border-box}body{margin:0;min-width:320px;background:#f6f7fb;color:var(--ink)}button,input{font:inherit}.shell{max-width:1180px;margin:auto;padding:0 24px 70px}.top{height:72px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line)}.brand{display:flex;align-items:center;gap:11px;font-weight:900}.brand i{width:36px;height:36px;display:grid;place-items:center;border-radius:11px;background:var(--ink);color:#fff;font-style:normal}.nav{display:flex;gap:8px}.nav button,.back{border:0;border-radius:10px;background:transparent;color:var(--muted);padding:10px 12px;cursor:pointer}.nav button:hover,.nav button.on,.back:hover{background:#e9ecf3;color:var(--ink)}.hero{padding:76px 0 44px;max-width:850px}.eyebrow{margin:0 0 12px;color:var(--blue);font-size:12px;font-weight:900;letter-spacing:.14em}.hero h1{margin:0;font-size:clamp(40px,7vw,72px);line-height:1.06;letter-spacing:-.05em}.hero>p{max-width:720px;margin:23px 0 0;color:var(--muted);font-size:19px;line-height:1.75}.choice{display:grid;grid-template-columns:1fr 1fr;gap:18px}.choice-card{min-height:290px;padding:30px;border:1px solid var(--line);border-radius:24px;background:var(--panel);display:flex;flex-direction:column;align-items:flex-start;text-align:left;cursor:pointer;transition:.2s}.choice-card:hover{transform:translateY(-4px);box-shadow:0 18px 40px #25314c16}.choice-card.tech{border-top:5px solid var(--blue)}.choice-card.ai{border-top:5px solid var(--green)}.choice-icon{font-size:34px}.choice-card h2{margin:22px 0 10px;font-size:28px}.choice-card p{margin:0;color:var(--muted);line-height:1.65}.choice-card strong{margin-top:auto;padding-top:25px;color:var(--blue)}.choice-card.ai strong{color:var(--green)}.search{margin:34px 0 18px;height:56px;padding:0 17px;display:flex;align-items:center;gap:10px;border:1px solid var(--line);border-radius:15px;background:#fff}.search input{width:100%;border:0;outline:0;background:transparent;color:var(--ink)}.section{margin-top:36px}.section-head{display:flex;align-items:end;justify-content:space-between;gap:20px;margin-bottom:16px}.section-head h2{margin:4px 0 0;font-size:30px}.section-head p{margin:7px 0 0;color:var(--muted)}.count{color:var(--muted);font-size:14px}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}.doc-card{padding:22px;border:1px solid var(--line);border-radius:17px;background:#fff;text-align:left;color:var(--ink);cursor:pointer}.doc-card:hover{border-color:#aeb9d5}.doc-card .meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px}.doc-card .icon{font-size:25px}.type{padding:5px 8px;border-radius:999px;background:var(--blue2);color:var(--blue);font-size:11px;font-weight:900}.type.ai{background:var(--green2);color:var(--green)}.doc-card h3{margin:0 0 8px;font-size:21px}.doc-card p{margin:0;color:var(--muted);line-height:1.6}.empty{padding:40px;border:1px dashed var(--line);border-radius:16px;text-align:center;color:var(--muted)}.doc{max-width:860px;margin:38px auto}.doc-hero{padding:34px;border:1px solid var(--line);border-radius:22px;background:#fff}.doc-hero .icon{font-size:38px}.doc-hero h1{margin:15px 0 12px;font-size:clamp(36px,6vw,58px);letter-spacing:-.04em}.doc-hero>p{margin:0;color:var(--muted);font-size:18px;line-height:1.7}.block{margin-top:16px;padding:25px;border:1px solid var(--line);border-radius:17px;background:#fff}.block h2{margin:0 0 12px;font-size:21px}.block p,.block li{color:#4d5a70;line-height:1.8}.block ul{margin:0;padding-left:21px}.memory{background:#f0f3ff;border-color:#cad4ff}.memory.ai{background:#edf9f4;border-color:#c2eadb}.memory p{margin:0;color:var(--ink);font-size:18px;font-weight:800}.code{white-space:pre-wrap;padding:17px;border-radius:13px;background:#111827;color:#e5e7eb;line-height:1.65;overflow:auto}.footer-note{margin-top:32px;padding-top:20px;border-top:1px solid var(--line);color:var(--muted);font-size:13px}@media(max-width:760px){.top{height:auto;padding:15px 0;align-items:flex-start}.nav{flex-wrap:wrap;justify-content:flex-end}.hero{padding:52px 0 32px}.choice,.grid{grid-template-columns:1fr}.choice-card{min-height:245px}.section-head{align-items:flex-start;flex-direction:column}.shell{padding-left:16px;padding-right:16px}.doc-hero,.block{padding:21px}}

<script>
const docs=[
{id:'pointer-event',type:'tech',icon:'👆',title:'Pointer Event',summary:'마우스와 터치를 한 가지 방식으로 처리하는 입력 기술',sections:[['이 기술이 뭔가요?','Pointer Event는 마우스 클릭, 손가락 터치, 펜 입력을 하나의 이벤트 방식으로 다루게 해주는 브라우저 기술입니다.'],['왜 GuideFlow에 필요했나요?','GuideFlow에서는 이미지와 화면 요소를 선택하고 움직이는 기능이 필요했습니다. 마우스 이벤트만 사용하면 모바일 터치에서 동작하지 않을 수 있기 때문에 Pointer Event를 사용했습니다.'],['어디에 사용했나요?',['이미지 드래그 시작과 이동','장면 안의 요소 선택','PC와 모바일의 입력 방식 통합']],['쉽게 비유하면','마우스용 리모컨과 터치용 리모컨을 따로 만들지 않고, 하나의 공용 리모컨으로 조작하는 것과 같습니다.'],['간단한 예제','CODE::element.addEventListener("pointerdown", startDrag);\nelement.addEventListener("pointermove", moveDrag);\nelement.addEventListener("pointerup", endDrag);'],['다른 프로그램에서는?','칸반 보드의 카드 이동, 이미지 편집기, 지도 조작, 슬라이더처럼 사용자가 직접 화면 요소를 움직이는 프로그램에 재사용할 수 있습니다.'],['이것만 기억하세요','Pointer Event = 마우스와 터치를 함께 처리하는 입력 방식']],related:['scene-number','image-replace']},
{id:'scene-number',type:'tech',icon:'🔢',title:'Scene Numbering',summary:'장면의 순서와 식별자를 안전하게 관리하는 방법',sections:[['이 기술이 뭔가요?','여러 장면이 있는 프로그램에서 각 장면을 구분하고 순서를 유지하기 위한 데이터 관리 방식입니다.'],['왜 GuideFlow에 필요했나요?','장면을 추가하거나 복제하고 삭제할 때 화면에 보이는 번호와 내부 데이터의 식별자가 서로 꼬이지 않아야 했습니다.'],['어디에 사용했나요?',['장면 목록 순서 표시','장면 복제 후 새 번호 부여','삭제 이후 화면 번호 다시 계산']],['쉽게 비유하면','책의 페이지를 중간에 추가하거나 빼도 페이지 번호가 다시 자연스럽게 이어지도록 정리하는 것과 같습니다.'],['실무에서 주의할 점','화면에 보이는 순번과 데이터의 고유 ID를 같은 값으로 사용하면 삭제나 이동 때 오류가 생기기 쉽습니다. 고유 ID는 유지하고, 화면 번호만 현재 배열 순서에 따라 계산하는 편이 안전합니다.'],['다른 프로그램에서는?','슬라이드 편집기, 설문 제작 도구, 강의 목차, 영상 장면 관리 프로그램에 그대로 적용할 수 있습니다.'],['이것만 기억하세요','고유 ID와 화면 순번은 서로 다른 역할입니다.']],related:['image-replace','local-storage']},
{id:'image-replace',type:'tech',icon:'🖼️',title:'Image Replace',summary:'기존 위치와 설정을 유지하면서 이미지만 교체하는 방식',sections:[['이 기술이 뭔가요?','사용자가 선택한 이미지 파일을 읽어 현재 이미지 요소의 소스만 바꾸는 기능입니다.'],['왜 GuideFlow에 필요했나요?','이미지의 크기와 위치를 다시 설정하지 않고, 현재 편집 상태를 유지한 채 내용만 바꿀 수 있어야 했습니다.'],['어디에 사용했나요?',['장면 이미지 교체','기존 위치와 크기 유지','새 파일 미리보기']],['쉽게 비유하면','액자는 그대로 두고 액자 안의 사진만 바꾸는 것과 같습니다.'],['간단한 예제','CODE::const file = input.files[0];\nconst url = URL.createObjectURL(file);\nselectedImage.src = url;'],['GuideFlow에서 배운 점','교체 대상이 현재 선택된 이미지인지 먼저 확인해야 합니다. 선택 상태가 불분명하면 다른 장면의 이미지가 바뀌는 문제가 생길 수 있습니다.'],['다른 프로그램에서는?','프로필 사진 변경, 상품 이미지 편집, 카드 뉴스 제작, 문서 첨부 이미지 교체에 사용할 수 있습니다.'],['이것만 기억하세요','교체는 요소를 새로 만드는 것이 아니라 기존 요소의 내용만 바꾸는 작업입니다.']],related:['pointer-event','local-storage']},
{id:'local-storage',type:'tech',icon:'💾',title:'LocalStorage',summary:'브라우저에 작은 데이터를 저장해 새로고침 후에도 유지하는 기술',sections:[['이 기술이 뭔가요?','LocalStorage는 브라우저 안에 문자열 형태의 데이터를 저장하는 간단한 저장 공간입니다.'],['왜 GuideFlow에 필요했나요?','사용자가 작업 중인 일부 설정이나 최근 상태를 새로고침 후에도 유지할 때 유용합니다.'],['쉽게 비유하면','웹사이트마다 브라우저 안에 작은 서랍 하나를 빌려 쓰는 것과 같습니다.'],['간단한 예제','CODE::localStorage.setItem("project", JSON.stringify(data));\nconst saved = JSON.parse(localStorage.getItem("project") || "null");'],['주의할 점','큰 이미지나 중요한 사용자 데이터를 저장하는 용도에는 적합하지 않습니다. 브라우저를 바꾸면 데이터가 따라가지 않으며, 사용자가 저장소를 지우면 사라질 수 있습니다.'],['다른 프로그램에서는?','최근 본 문서, 임시 설정, 테마, 작성 중인 간단한 폼을 보존하는 데 사용할 수 있습니다.'],['이것만 기억하세요','LocalStorage = 한 브라우저 안에서 사용하는 작은 임시 서랍']],related:['scene-number','vercel']},
{id:'github',type:'tech',icon:'🐙',title:'GitHub',summary:'프로그램의 원본 코드와 변경 기록을 보관하는 공간',sections:[['이 기술이 뭔가요?','GitHub는 Git으로 관리되는 코드 저장소를 인터넷에 보관하고 협업할 수 있게 해주는 서비스입니다.'],['왜 GuideFlow에 필요했나요?','수정 전후의 코드를 기록하고, 문제가 생겼을 때 이전 상태를 확인하며, Vercel 배포의 원본으로 사용했습니다.'],['쉽게 비유하면','프로그램 파일을 저장하는 클라우드이면서, 모든 수정 이력이 남는 작업 일지입니다.'],['GuideFlow에서의 역할',['코드 원본 보관','변경 사항을 커밋으로 기록','Vercel 배포와 연결','오류가 생긴 변경 범위 확인']],['다른 프로그램에서는?','앞으로 만드는 모든 프로그램의 원본 저장소와 작업 기록으로 재사용할 수 있습니다.'],['이것만 기억하세요','GitHub 반영과 실제 사이트 동작 확인은 서로 다른 검증입니다.']],related:['vercel','verified-work']},
{id:'vercel',type:'tech',icon:'▲',title:'Vercel',summary:'GitHub의 웹 프로젝트를 실제 주소로 배포하는 서비스',sections:[['이 기술이 뭔가요?','Vercel은 GitHub 저장소의 웹 프로젝트를 빌드하고 인터넷에서 접속 가능한 사이트로 배포해주는 서비스입니다.'],['왜 GuideFlow에 필요했나요?','컴퓨터 안의 코드가 아니라 실제 사용자가 접속할 수 있는 결과물을 확인하기 위해 사용했습니다.'],['쉽게 비유하면','GitHub에 있는 설계도와 재료를 가져가 실제 전시장을 만들어주는 서비스입니다.'],['GuideFlow에서 배운 점','GitHub 커밋이 성공해도 Vercel 빌드가 실패할 수 있고, 배포가 성공해도 특정 기능이 브라우저에서 제대로 동작하지 않을 수 있습니다.'],['확인 순서',['GitHub에 최신 코드가 있는지 확인','Vercel 배포 상태 확인','실제 배포 주소 열기','수정한 기능을 직접 사용해 확인']],['다른 프로그램에서는?','웹사이트, 관리 도구, 간단한 SaaS의 초기 배포에 재사용할 수 있습니다.'],['이것만 기억하세요','배포 성공은 기능 동작 성공과 같은 말이 아닙니다.']],related:['github','verified-work']},
{id:'small-scope',type:'ai',icon:'🧩',title:'작업을 작게 나누기',summary:'AI에게 한 번에 하나의 명확한 기능만 맡기는 방법',sections:[['어떤 문제가 생기나요?','“전체를 더 좋게 만들어줘”처럼 범위가 큰 요청은 AI가 필요하지 않은 기능까지 바꾸거나 기존 동작을 깨뜨리게 만들 수 있습니다.'],['왜 이런 문제가 생기나요?','AI는 빈 부분을 스스로 해석해 채우기 때문에 범위가 넓을수록 사용자의 의도와 다른 결정을 내릴 가능성이 커집니다.'],['좋은 요청 방식',['수정할 화면이나 파일을 정합니다.','이번에 바꿀 기능 하나를 적습니다.','건드리면 안 되는 기존 기능을 적습니다.','완료 기준을 눈으로 확인할 수 있게 적습니다.']],['좋지 않은 요청','CODE::사이트를 전체적으로 더 좋고 편하게 바꿔줘.'],['개선된 요청','CODE::홈 화면의 메뉴만 수정해줘.\n메뉴는 “GuideFlow 기술”과 “AI 협업 노하우” 두 개만 보여줘.\n기존 문서 데이터는 삭제하지 마.\n완료 기준은 두 메뉴가 각각 해당 문서 목록으로 이동하는 거야.'],['GuideFlow에서 배운 점','작은 수정 단위로 진행했을 때 오류 원인을 찾기 쉽고, 마음에 들지 않으면 되돌리기도 쉬웠습니다.'],['이것만 기억하세요','한 번의 요청 = 한 가지 변화']],related:['verified-work','protect-existing']},
{id:'protect-existing',type:'ai',icon:'🛡️',title:'기존 기능을 보호하며 수정하기',summary:'새 기능 때문에 이미 잘 되던 기능이 깨지지 않게 요청하는 방법',sections:[['어떤 문제가 생기나요?','AI가 새 기능을 구현하면서 관련 없어 보이는 기존 코드까지 정리하거나 교체해 다른 기능이 사라질 수 있습니다.'],['좋은 요청에 포함할 내용',['현재 정상 동작하는 기능','수정 허용 범위','삭제하거나 변경하면 안 되는 요소','수정 후 확인할 기존 동작']],['개선된 요청','CODE::이미지 교체 기능만 수정해줘.\n드래그, 크기 조절, 장면 복제 기능은 현재 동작을 유지해야 해.\n수정 후 이미지 교체뿐 아니라 이 세 기능도 영향받지 않았는지 확인 방법을 알려줘.'],['GuideFlow에서 배운 점','새 기능의 성공만 확인하면 부족합니다. 관련된 기존 기능을 함께 확인해야 실제 회귀 오류를 발견할 수 있습니다.'],['다른 프로그램에서의 규칙','수정 전에는 보호할 기능을 목록으로 만들고, 수정 후에는 새 기능과 기존 기능을 같이 테스트합니다.'],['이것만 기억하세요','새 기능 테스트 + 기존 기능 재확인 = 안전한 수정']],related:['small-scope','verified-work']},
{id:'verified-work',type:'ai',icon:'✅',title:'구현과 검증을 구분하기',summary:'코드 수정, 배포 성공, 실제 동작을 서로 구분하는 협업 원칙',sections:[['어떤 문제가 생기나요?','AI가 코드를 작성했다는 이유만으로 기능이 완성됐다고 말할 수 있습니다. 하지만 저장소 반영, 배포, 브라우저 동작은 각각 별개의 단계입니다.'],['세 단계 구분',['코드 구현: 파일에 수정 내용이 존재함','배포 확인: 최신 커밋의 배포 상태가 성공함','실제 동작 확인: 사용자가 브라우저에서 기능을 직접 실행함']],['AI에게 이렇게 요청하세요','CODE::확인한 것과 확인하지 못한 것을 구분해서 말해줘.\nGitHub 커밋과 배포 상태는 확인하고, 브라우저에서 직접 테스트하지 않았다면 동작 확인 완료라고 말하지 마.'],['GuideFlow에서 배운 점','그럴듯한 설명보다 어떤 증거를 실제로 확인했는지가 중요했습니다.'],['다른 프로그램에서의 규칙','모든 작업 보고에는 “확인됨”과 “미확인”을 분리합니다.'],['이것만 기억하세요','코드가 있음 ≠ 배포됨 ≠ 실제로 잘 동작함']],related:['github','vercel','small-scope']},
{id:'debug-request',type:'ai',icon:'🔍',title:'AI에게 오류 수정을 요청하는 법',summary:'추측 대신 현상과 기대 결과를 기준으로 원인을 찾게 하는 방법',sections:[['어떤 문제가 생기나요?','“안 돼, 고쳐줘”만 전달하면 AI는 가능한 원인을 추측하면서 불필요한 부분까지 수정할 수 있습니다.'],['먼저 전달할 정보',['어떤 행동을 했는지','실제로 무엇이 보였는지','원래 무엇이 보여야 하는지','언제부터 문제가 생겼는지','관련된 화면이나 오류 메시지']],['개선된 요청','CODE::현재 현상: 장면을 복제하면 번호가 중복돼.\n기대 결과: 복제한 장면은 마지막 번호 다음 번호를 가져야 해.\n관련 기능: 장면 추가, 삭제, 순서 이동.\n먼저 현재 번호 생성 코드를 확인하고 원인을 설명한 뒤 가장 작은 수정만 해줘.'],['GuideFlow에서 배운 점','증상과 기대 결과를 분리하면 AI가 문제를 더 정확히 이해하고 수정 범위를 좁힐 수 있었습니다.'],['이것만 기억하세요','오류 요청 = 행동 + 실제 결과 + 기대 결과']],related:['small-scope','verified-work']}
];
const app=document.querySelector('#app');
const state={view:location.hash.replace('#/','')||'home',query:''};
const label=t=>t==='tech'?'GuideFlow 기술':'AI 협업 노하우';
function navigate(view){location.hash=view==='home'?'':`/${view}`;state.view=view;render();scrollTo({top:0,behavior:'smooth'})}
function nav(){return `<header class="top"><div class="brand"><i>W</i><span>AI Development Wiki</span></div><nav class="nav"><button class="${state.view==='home'?'on':''}" data-nav="home">홈</button><button class="${state.view==='tech'?'on':''}" data-nav="tech">GuideFlow 기술</button><button class="${state.view==='ai'?'on':''}" data-nav="ai">AI 협업 노하우</button></nav></header>`}
function card(d){return `<button class="doc-card" data-doc="${d.id}"><div class="meta"><span class="icon">${d.icon}</span><span class="type ${d.type}">${label(d.type)}</span></div><h3>${d.title}</h3><p>${d.summary}</p></button>`}
function list(type,query=''){const q=query.trim().toLowerCase();return docs.filter(d=>(!type||d.type===type)&&(!q||[d.title,d.summary,...d.sections.flatMap(s=>Array.isArray(s[1])?s[1]:[s[1]])].join(' ').toLowerCase().includes(q)))}
function home(){const results=list(null,state.query);return `${nav()}<section class="hero"><p class="eyebrow">GUIDEFLOW DEVELOPMENT NOTES</p><h1>GuideFlow를 만들며<br>배운 것을 남깁니다.</h1><p>실제로 사용한 개발 기술이 무엇이고 왜 필요했는지, 그리고 다음 프로그램에도 재사용할 수 있는 AI 협업 방법을 초보자도 이해할 수 있게 정리합니다.</p></section><section class="choice"><button class="choice-card tech" data-nav="tech"><span class="choice-icon">📘</span><h2>GuideFlow 개발 기술</h2><p>GuideFlow에 실제로 사용한 기술의 이름, 역할, 사용 이유와 다른 프로그램에서의 활용법을 설명합니다.</p><strong>기술문서 보기 →</strong></button><button class="choice-card ai" data-nav="ai"><span class="choice-icon">🤖</span><h2>AI 협업 노하우</h2><p>AI와 기능을 만들고 오류를 해결하며 얻은 방법을 다음 프로젝트에서도 사용할 수 있도록 정리합니다.</p><strong>협업 노하우 보기 →</strong></button></section><label class="search">⌕<input id="search" value="${state.query}" placeholder="기술이나 협업 방법 검색"></label>${state.query?`<section class="section"><div class="section-head"><div><p class="eyebrow">SEARCH</p><h2>검색 결과</h2></div><span class="count">${results.length}개 문서</span></div><div class="grid">${results.length?results.map(card).join(''):'<div class="empty">검색 결과가 없습니다.</div>'}</div></section>`:''}<p class="footer-note">현재는 방향 확인을 위한 첫 번째 시안입니다. 문서 종류와 내용은 GuideFlow 작업 기록을 바탕으로 계속 보강합니다.</p>`}
function category(type){const items=list(type,state.query);return `${nav()}<section class="hero"><p class="eyebrow">${type==='tech'?'GUIDEFLOW TECHNOLOGY':'AI COLLABORATION'}</p><h1>${label(type)}</h1><p>${type==='tech'?'GuideFlow를 만들 때 실제로 사용한 기술을 초보자도 이해할 수 있도록 설명합니다. 기술 이름만 나열하지 않고 왜 필요했고 어디에 사용했는지를 중심으로 정리합니다.':'GuideFlow 개발 과정에서 얻은 AI 협업 방법을 다음 프로그램에서도 재사용할 수 있도록 정리합니다.'}</p></section><label class="search">⌕<input id="search" value="${state.query}" placeholder="${type==='tech'?'기술 이름 또는 사용 목적 검색':'협업 문제 또는 해결 방법 검색'}"></label><section class="section"><div class="section-head"><div><p class="eyebrow">DOCUMENTS</p><h2>${type==='tech'?'사용 기술':'재사용 가능한 원칙'}</h2></div><span class="count">${items.length}개 문서</span></div><div class="grid">${items.length?items.map(card).join(''):'<div class="empty">검색 결과가 없습니다.</div>'}</div></section>`}
function block([title,body],type){if(title==='이것만 기억하세요')return `<section class="block memory ${type}"><h2>${title}</h2><p>${body}</p></section>`;if(typeof body==='string'&&body.startsWith('CODE::'))return `<section class="block"><h2>${title}</h2><pre class="code">${body.slice(6)}</pre></section>`;if(Array.isArray(body))return `<section class="block"><h2>${title}</h2><ul>${body.map(x=>`<li>${x}</li>`).join('')}</ul></section>`;return `<section class="block"><h2>${title}</h2><p>${body}</p></section>`}
function documentView(id){const d=docs.find(x=>x.id===id);if(!d)return home();const related=(d.related||[]).map(id=>docs.find(x=>x.id===id)).filter(Boolean);return `${nav()}<article class="doc"><button class="back" data-nav="${d.type}">← ${label(d.type)}</button><header class="doc-hero"><span class="icon">${d.icon}</span><p class="eyebrow">${label(d.type)}</p><h1>${d.title}</h1><p>${d.summary}</p></header>${d.sections.map(s=>block(s,d.type)).join('')}${related.length?`<section class="section"><div class="section-head"><div><p class="eyebrow">RELATED</p><h2>함께 보면 좋은 문서</h2></div></div><div class="grid">${related.map(card).join('')}</div></section>`:''}</article>`}
function bind(){document.querySelectorAll('[data-nav]').forEach(b=>b.onclick=()=>navigate(b.dataset.nav));document.querySelectorAll('[data-doc]').forEach(b=>b.onclick=()=>navigate(`doc/${b.dataset.doc}`));const s=document.querySelector('#search');if(s)s.oninput=e=>{state.query=e.target.value;render();document.querySelector('#search')?.focus()}}
function render(){if(state.view==='home')app.innerHTML=`<div class="shell">${home()}</div>`;else if(state.view==='tech'||state.view==='ai')app.innerHTML=`<div class="shell">${category(state.view)}</div>`;else if(state.view.startsWith('doc/'))app.innerHTML=`<div class="shell">${documentView(state.view.split('/')[1])}</div>`;else app.innerHTML=`<div class="shell">${home()}</div>`;bind()}
addEventListener('hashchange',()=>{state.view=location.hash.replace('#/','')||'home';state.query='';render()});render();
</script></body></html>

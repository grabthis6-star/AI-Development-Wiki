<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="description" content="GuideFlow 개발 기술과 AI 협업 노하우"><title>GuideFlow Knowledge Base</title>
<style>
:root{font-family:Inter,Pretendard,"Noto Sans KR",system-ui,sans-serif;color:#eef4ff;background:#07111f;--line:#ffffff22;--muted:#a9b7cc;--blue:#72c8ff;--panel:#0d1b2e}*{box-sizing:border-box}body{margin:0;min-width:320px;min-height:100vh;background:radial-gradient(circle at 90% 0,#06394a 0,transparent 32%),radial-gradient(circle at 0 20%,#251a54 0,transparent 34%),#07111f}button,a{font:inherit;color:inherit}.wrap{width:min(1080px,calc(100% - 36px));margin:auto;padding:24px 0 72px}.top{display:flex;align-items:center;justify-content:space-between;padding:10px 0 28px}.brand{display:flex;align-items:center;gap:12px;font-weight:900}.logo{width:42px;height:42px;display:grid;place-items:center;border-radius:13px;background:linear-gradient(135deg,#745cff,#22d3ee);font-size:21px}.top small,.muted{color:var(--muted)}.start{padding:clamp(26px,5vw,48px);border:1px solid #3abff866;border-radius:28px;background:linear-gradient(135deg,#193764e6,#12304de6)}.eyebrow{margin:0 0 13px;color:#8fc8ff;font-size:12px;font-weight:900;letter-spacing:.16em}.start h1,.page-title{max-width:850px;margin:0;font-size:clamp(34px,6vw,58px);line-height:1.12;letter-spacing:-.045em}.start>p{max-width:780px;margin:20px 0 28px;color:#c4d0e2;font-size:17px;line-height:1.75}.actions{display:flex;gap:10px;flex-wrap:wrap}.btn{display:inline-flex;align-items:center;justify-content:center;min-height:48px;padding:0 17px;border:1px solid #ffffff30;border-radius:13px;background:#ffffff0d;text-decoration:none;font-weight:850;cursor:pointer}.btn:hover{background:#ffffff18}.btn.primary{border-color:#fff;background:#fff;color:#10203a}.intro{margin:40px 0 15px}.intro h2{margin:0 0 8px;font-size:29px}.intro p,.page-copy{margin:0;color:var(--muted);line-height:1.7}.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}.door{min-height:270px;padding:28px;border:1px solid var(--line);border-radius:22px;background:#0d1b2ed9;text-decoration:none;display:flex;flex-direction:column;transition:.18s;cursor:pointer;text-align:left}.door:hover,.topic:hover{transform:translateY(-3px);border-color:#56b7ff88}.icon{font-size:38px}.door h2{margin:22px 0 10px;font-size:27px}.door p,.topic p,.detail p{margin:0;color:var(--muted);line-height:1.7}.door strong{margin-top:auto;padding-top:25px;color:#81c9ff}.note{margin-top:18px;padding:18px 20px;border:1px solid var(--line);border-radius:16px;color:var(--muted);line-height:1.7}.note strong{color:#eef4ff}.page-head{padding:25px 0 28px}.back{border:0;background:transparent;color:#9ed8ff;padding:0 0 18px;cursor:pointer}.topic-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.topic{padding:22px;border:1px solid var(--line);border-radius:19px;background:#0d1b2ed9;color:white;text-align:left;cursor:pointer;transition:.18s}.topic span{font-size:29px}.topic h2{margin:16px 0 8px;font-size:20px}.topic strong{display:block;margin-top:18px;color:#81c9ff}.detail{max-width:820px}.detail-head,.block{padding:27px;border:1px solid var(--line);border-radius:20px;background:#0d1b2ed9}.detail-head h1{margin:16px 0 10px;font-size:clamp(32px,6vw,52px)}.block{margin-top:14px}.block h2{margin:0 0 10px;font-size:21px}.reuse{color:#9fe6d0!important}.hidden{display:none}@media(max-width:900px){.topic-grid{grid-template-columns:1fr 1fr}}@media(max-width:720px){.top small{display:none}.grid,.topic-grid{grid-template-columns:1fr}.start{border-radius:22px}.door{min-height:235px}}
</style>
</head><body><main class="wrap"><header class="top"><div class="brand"><span class="logo">⚡</span><span>GuideFlow Knowledge Base</span></div><small>기술과 AI 협업 기록</small></header><div id="app"></div></main>
<script>
const topics=[{"icon":"📋","title":"캡처 이미지 붙여넣기","summary":"Ctrl+V로 캡처 이미지를 바로 추가하는 GuideFlow의 핵심 진입 기능","why":"파일 저장과 가져오기 창을 없애 아이디어 흐름을 끊지 않습니다.","problem":"클립보드의 이미지와 텍스트를 구분하고, 선택 상태에 따라 새 이미지 추가와 교체가 달라져야 합니다.","reuse":"무드보드, 카드뉴스, 상품 이미지 정리와 레퍼런스 보드"},{"icon":"🔄","title":"붙여넣기로 이미지 교체","summary":"위치와 크기는 유지하고 이미지 내용만 바꾸는 기능","why":"새 이미지를 다시 배치하는 반복 작업을 없앱니다.","problem":"선택된 요소가 이미지인지 확인하지 않으면 엉뚱한 장면에 추가될 수 있습니다.","reuse":"프로필·상품·슬라이드·템플릿 이미지 교체"},{"icon":"✋","title":"이미지 이동과 크기 조절","summary":"전체 보드에서 이미지를 직접 끌고 크기를 조정하는 기능","why":"숫자 입력보다 빠르게 전체 구도와 느낌을 잡을 수 있습니다.","problem":"드래그 시작·이동·종료 상태와 보드 경계를 분리해 처리해야 합니다.","reuse":"칸반 보드, 슬라이드, 스티커 배치와 간단한 디자인 도구"},{"icon":"🎞️","title":"장면 데이터와 고유 ID","summary":"장면 순서가 바뀌어도 정확한 장면을 수정하는 데이터 구조","why":"화면 순번은 변하지만 내부 장면의 정체성은 유지되어야 합니다.","problem":"화면 번호를 ID로 쓰면 삭제·복제·정렬 후 다른 장면이 수정될 수 있습니다.","reuse":"설문, 강의 목차, 슬라이드와 카드 목록"},{"icon":"🧭","title":"보드 중심 편집 화면","summary":"별도 편집 모드 없이 전체 장면을 보며 바로 수정하는 구조","why":"모드 전환을 줄여 GuideFlow의 가벼운 접근성을 지킵니다.","problem":"설명 상자와 옵션이 늘어나면 기존 편집 프로그램처럼 복잡해집니다.","reuse":"초보자용 제작 도구와 빠른 아이디어 스케치 앱"},{"icon":"⏱️","title":"장면 시간과 마지막 장면","summary":"장면별 시간을 재생과 내보내기에 정확히 적용하는 방법","why":"가이드의 리듬과 전체 영상 길이를 확인할 수 있습니다.","problem":"마지막 장면은 다음 장면이 없어 설정 시간 전에 종료되기 쉽습니다.","reuse":"슬라이드쇼, 사이니지와 자동 재생 프레젠테이션"},{"icon":"📤","title":"내보내기와 결과 검증","summary":"보드의 순서·시간·비율을 실제 결과물로 옮기는 과정","why":"외주 전달과 본편집 참고에 사용할 수 있어야 합니다.","problem":"편집 화면과 내보내기 결과는 다를 수 있어 완성 파일을 직접 재생해야 합니다.","reuse":"스토리보드, 프레젠테이션과 가이드 영상"},{"icon":"📱","title":"모바일 버튼과 UI","summary":"작은 화면에서 버튼 글자와 배열이 깨지지 않게 만드는 방법","why":"휴대폰에서도 빠르게 확인하고 수정할 수 있어야 합니다.","problem":"고정 너비와 긴 문구 때문에 글자가 밖으로 튀어나오고 배열이 무너질 수 있습니다.","reuse":"모든 도구형 반응형 웹사이트"},{"icon":"🚀","title":"GitHub와 Vercel 배포","summary":"코드 변경과 실제 공개 화면을 연결하고 검증하는 과정","why":"커밋됐다는 말이 아니라 사용자가 실제 결과를 볼 수 있어야 합니다.","problem":"수정한 파일과 실제 빌드 파일이 달라 배포 성공 후에도 화면이 바뀌지 않을 수 있습니다.","reuse":"GitHub에서 자동 배포하는 모든 웹 프로젝트"}];
const app=document.querySelector('#app');
function home(){app.innerHTML=`<section class="start"><p class="eyebrow">START HERE · AI HANDOFF</p><h1>새 AI에게 GuideFlow의 맥락을 한 번에 전달하세요.</h1><p>GuideFlow는 완성 영상 편집기가 아니라, 캡처 이미지를 붙여 넣어 약 5분 안에 영상 아이디어를 스케치하는 가벼운 도구입니다. 이전 개발의 목적·기술·시행착오를 한 문서로 전달할 수 있습니다.</p><div class="actions"><a class="btn primary" href="./GUIDEFLOW_CONTEXT.md" target="_blank" rel="noopener">컨텍스트 문서 열기 →</a><a class="btn" href="./GUIDEFLOW_CONTEXT.md" download>첨부용 문서 저장</a></div></section><section class="intro"><h2>실제 개발 경험 두 가지만 정리합니다.</h2><p>GuideFlow의 기능을 어떻게 만들었는지, AI와 어떻게 협업해야 같은 시행착오를 피하는지 확인하세요.</p></section><section class="grid"><button class="door" data-tech><span class="icon">🖼️</span><h2>GuideFlow 개발 기술</h2><p>이미지 붙여넣기·교체·드래그, 장면 관리, 재생, 내보내기와 배포를 실제 문제 중심으로 설명합니다.</p><strong>기술 카드 보기 →</strong></button><a class="door" href="./AI_RULES.md" target="_blank" rel="noopener"><span class="icon">🤖</span><h2>AI 협업 노하우</h2><p>작업 범위를 지키고 기존 기능을 보호하며 구현·커밋·배포·실제 동작을 검증하는 방법입니다.</p><strong>협업 규칙 보기 →</strong></a></section><aside class="note"><strong>사용 방법:</strong> 새 프로젝트에서는 컨텍스트 문서를 AI에게 먼저 첨부하고, 비슷한 기능을 만들 때 기술 카드를 참고하세요.</aside>`;document.querySelector('[data-tech]').onclick=list}
function list(){app.innerHTML=`<section class="page-head"><button class="back" data-home>← 처음으로</button><p class="eyebrow">GUIDEFLOW DEVELOPMENT</p><h1 class="page-title">기능을 만들며 배운 기술</h1><p class="page-copy">기술 이름보다 실제로 해결한 문제를 기준으로 정리했습니다. 궁금한 카드를 누르면 사용 이유와 재사용 방법을 볼 수 있습니다.</p></section><section class="topic-grid">${topics.map((t,i)=>`<button class="topic" data-topic="${i}"><span>${t.icon}</span><h2>${t.title}</h2><p>${t.summary}</p><strong>자세히 보기 →</strong></button>`).join('')}</section>`;document.querySelector('[data-home]').onclick=home;document.querySelectorAll('[data-topic]').forEach(x=>x.onclick=()=>detail(Number(x.dataset.topic)))}
function detail(i){const t=topics[i];app.innerHTML=`<article class="detail"><button class="back" data-list>← 기술 목록</button><header class="detail-head"><span class="icon">${t.icon}</span><p class="eyebrow">GUIDEFLOW FEATURE</p><h1>${t.title}</h1><p>${t.summary}</p></header><section class="block"><h2>왜 필요했나요?</h2><p>${t.why}</p></section><section class="block"><h2>실제로 주의할 문제</h2><p>${t.problem}</p></section><section class="block"><h2>다른 프로그램에서 재사용</h2><p class="reuse">${t.reuse}</p></section><section class="block"><h2>더 자세한 설명</h2><p>전체 기술 설명과 구현 원칙은 <a href="./TECH_INDEX.md" target="_blank" rel="noopener">GuideFlow 개발 기술 원문</a>에서 확인할 수 있습니다.</p></section></article>`;document.querySelector('[data-list]').onclick=list}
home();
</script></body></html>

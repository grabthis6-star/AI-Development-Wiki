<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="description" content="프로젝트, 지식, 프롬프트와 패턴을 연결하는 AI Development OS">
<title>AI Development OS</title>
<style>
:root{font-family:Inter,Pretendard,system-ui,sans-serif;color:#eef2ff;background:#070b14;--panel:#0f172acc;--line:#94a3b82b;--muted:#9aa7bd;--accent:#8b5cf6;--cyan:#22d3ee}*{box-sizing:border-box}body{margin:0;min-width:320px;min-height:100vh;background:radial-gradient(circle at 10% 0,#1e1b4b 0,transparent 34%),radial-gradient(circle at 90% 10%,#083344 0,transparent 30%),#070b14}button,input{font:inherit}.shell{max-width:1440px;margin:auto;padding:20px;display:grid;grid-template-columns:250px 1fr;gap:20px}.side{position:sticky;top:20px;height:calc(100vh - 40px);padding:20px;border:1px solid var(--line);border-radius:22px;background:#0b1020e8;display:flex;flex-direction:column}.brand{display:flex;gap:12px;align-items:center;margin-bottom:24px}.brand span,.sidefoot{font-size:12px;color:var(--muted)}.logo{width:44px;height:44px;border-radius:14px;display:grid;place-items:center;background:linear-gradient(135deg,var(--accent),var(--cyan));font-size:22px}nav{display:grid;gap:7px}nav button,.back,.filters button{border:1px solid transparent;background:transparent;color:#b7c1d4;cursor:pointer}nav button{padding:12px 13px;border-radius:12px;text-align:left}nav button:hover,nav button.on,.filters button.on{color:white;background:#8b5cf61f;border-color:#8b5cf655}.sidefoot{margin-top:auto;padding-top:18px;border-top:1px solid var(--line);line-height:1.6}main{min-width:0}.topbar{display:flex;gap:16px;align-items:center;margin-bottom:20px}.search{flex:1;display:flex;gap:10px;align-items:center;height:52px;padding:0 16px;border:1px solid var(--line);border-radius:15px;background:var(--panel)}.search input{width:100%;border:0;outline:0;background:transparent;color:white}.pill{padding:10px 13px;border:1px solid var(--line);border-radius:999px;background:var(--panel);color:#cbd5e1}.hero,.project-hero{padding:34px;border:1px solid var(--line);border-radius:24px;background:linear-gradient(135deg,#312e81aa,#0e749055);display:flex;justify-content:space-between;gap:24px;align-items:center}.hero h1,.dochead h1,.project-hero h1{margin:0 0 10px;font-size:clamp(34px,5vw,58px);letter-spacing:-.04em}.hero p,.dochead p,.project-hero p{color:#c8d3e5;line-height:1.7}.score{min-width:170px;text-align:center;padding:20px;border-radius:20px;background:#02061755;border:1px solid #ffffff22}.score strong{display:block;font-size:42px}.score span{color:#cbd5e1;font-size:13px}.eyebrow{margin:0 0 8px!important;color:#a5b4fc!important;font-size:11px!important;font-weight:900;letter-spacing:.16em}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;margin:18px 0}.stats article,.panel{padding:18px;border:1px solid var(--line);border-radius:17px;background:var(--panel)}.stats span{font-size:13px;color:var(--muted)}.stats strong{display:block;margin-top:8px;font-size:28px}.stats .date-stat{font-size:18px}.section{margin-top:24px}.sectionhead{display:flex;justify-content:space-between;gap:16px;align-items:end;margin-bottom:13px}.sectionhead h2,.panel h2{margin:0}.filters{display:flex;gap:7px;flex-wrap:wrap}.filters button{padding:7px 10px;border-radius:999px;border-color:var(--line)}.grid,.recent{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.card{padding:20px;border:1px solid var(--line);border-radius:19px;background:linear-gradient(145deg,#172033dd,#0f172acc);cursor:pointer;color:white;text-align:left;transition:.18s}.card:hover{transform:translateY(-3px);border-color:#8b5cf699}.card .icon{display:block;font-size:26px}.tag{display:inline-block;margin:14px 0 8px;font-size:11px;color:#c4b5fd;font-weight:800}.card h3{margin:0 0 8px}.card p,.project span,.event p{color:var(--muted);line-height:1.55}.tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:14px}.tags span{padding:5px 8px;border-radius:999px;background:#8b5cf618;color:#c4b5fd;font-size:11px}.dashboard{display:grid;grid-template-columns:1.2fr .8fr;gap:14px}.project{display:grid;grid-template-columns:1fr auto;gap:10px;margin-top:15px;padding:15px 0 0;border:0;border-top:1px solid var(--line);background:transparent;color:white;text-align:left;width:100%}.project-link{cursor:pointer}.project-link:hover strong{color:#c4b5fd}.project span{display:block;font-size:12px;margin-top:5px}.project i{grid-column:1/-1;height:7px;border-radius:999px;background:#020617;overflow:hidden}.project em{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--cyan))}.event{display:grid;grid-template-columns:12px 1fr;gap:10px;margin-top:16px}.event>span{width:9px;height:9px;margin-top:5px;border-radius:50%;background:var(--cyan);box-shadow:0 0 0 5px #22d3ee18}.event small{color:#67e8f9}.event p{margin:5px 0 0;font-size:13px}.back{padding:10px 13px;margin-bottom:16px;border-color:var(--line);border-radius:11px;background:var(--panel)}.dochead{padding:30px;border:1px solid var(--line);border-radius:22px;background:linear-gradient(145deg,#312e81aa,#0f172add)}.docicon{font-size:38px}.content{margin-top:15px;padding:24px;border:1px solid var(--line);border-radius:18px;background:var(--panel)}.content li{color:#c5cfdd;line-height:1.9}.updated{margin-top:24px;color:var(--muted);font-size:12px}.empty{padding:40px;text-align:center;border:1px dashed var(--line);border-radius:18px;color:var(--muted)}.project-icon{display:block;font-size:46px;margin-bottom:16px}.repo-label{display:inline-flex;padding:8px 11px;border:1px solid var(--line);border-radius:10px;background:#02061755;color:#cbd5e1;font-size:12px}.workspace-layout{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:24px}.task-list{display:grid;gap:8px}.task-list>div{display:flex;gap:12px;align-items:center;padding:12px;border:1px solid var(--line);border-radius:13px;background:#02061744}.task-list span{display:grid;place-items:center;width:30px;height:30px;border-radius:9px;background:#8b5cf620;color:#c4b5fd;font-size:11px;font-weight:800}.task-list p{margin:0;color:#d7deea}.next-focus{margin-top:14px;padding:15px;border-radius:14px;background:linear-gradient(135deg,#8b5cf620,#22d3ee18);border:1px solid #8b5cf644}.next-focus small{display:block;color:var(--muted);margin-bottom:6px}.next-focus strong{color:#fff}.project-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.workspace-tile{display:flex;gap:12px;align-items:center;padding:16px;border:1px solid var(--line);border-radius:16px;background:var(--panel);color:white;text-align:left;cursor:pointer}.workspace-tile:hover{border-color:#8b5cf699}.workspace-tile>span{font-size:27px}.workspace-tile strong,.workspace-tile small{display:block}.workspace-tile small{margin-top:5px;color:var(--muted)}
.welcome{padding:36px;border:1px solid #8b5cf655;border-radius:26px;background:linear-gradient(135deg,#312e81cc,#0f766e77);display:grid;grid-template-columns:1fr minmax(240px,340px);gap:28px;align-items:center}.welcome h1{margin:0 0 14px;font-size:clamp(36px,5vw,64px);letter-spacing:-.045em;line-height:1.04}.welcome>div>p:not(.eyebrow){max-width:680px;color:#d5deeb;line-height:1.75}.welcome-badge{padding:22px;border:1px solid #ffffff2b;border-radius:20px;background:#02061766}.welcome-badge span,.welcome-badge strong{display:block}.welcome-badge span{color:#a5b4fc;font-size:12px;font-weight:800}.welcome-badge strong{margin:10px 0 18px;font-size:22px}.welcome button,.guide-action button,.next-guide button{border:1px solid #ffffff30;border-radius:12px;background:#ffffff12;color:white;padding:11px 14px;cursor:pointer}.welcome button:hover,.guide-action button:hover,.next-guide button:hover{background:#ffffff20}.guide-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.guide-action{min-height:220px;padding:22px;border:1px solid var(--line);border-radius:20px;background:linear-gradient(145deg,#172033e6,#0f172acc);display:flex;flex-direction:column}.guide-icon{font-size:34px}.guide-action h3{margin:18px 0 7px;font-size:21px}.guide-action p{margin:0;color:var(--muted);line-height:1.6}.guide-action button{margin-top:auto;align-self:flex-start}.section-copy{margin:8px 0 0;color:var(--muted);line-height:1.55}.learning-section{padding:24px;border:1px solid var(--line);border-radius:22px;background:#0b1020aa}.learning-path{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}.path-step{position:relative;display:flex;gap:11px;align-items:flex-start;padding:15px;border:1px solid var(--line);border-radius:15px;background:#111a2be6;color:white;text-align:left;cursor:pointer}.path-step:hover{border-color:#22d3ee88;transform:translateY(-2px)}.path-step>span{flex:0 0 29px;height:29px;display:grid;place-items:center;border-radius:9px;background:#22d3ee18;color:#67e8f9;font-size:12px;font-weight:900}.path-step strong,.path-step small{display:block}.path-step small{margin-top:6px;color:var(--muted);line-height:1.45}.doc-intro{margin-bottom:22px;padding:16px;border:1px solid #22d3ee3d;border-radius:14px;background:#22d3ee0c}.doc-intro span,.doc-intro strong{display:block}.doc-intro span{margin-bottom:6px;color:#67e8f9;font-size:12px;font-weight:800}.next-guide{margin-top:16px;padding:22px;border:1px solid #8b5cf655;border-radius:18px;background:linear-gradient(135deg,#312e8155,#0f766e33);display:flex;justify-content:space-between;align-items:center;gap:20px}.next-guide h2{margin:0}.next-guide p{margin:8px 0 0;color:var(--muted)}
@media(max-width:1100px){.learning-path{grid-template-columns:repeat(2,1fr)}.guide-grid{grid-template-columns:1fr}.welcome{grid-template-columns:1fr}}@media(max-width:1050px){.grid,.recent{grid-template-columns:repeat(2,1fr)}.stats{grid-template-columns:repeat(2,1fr)}.dashboard,.workspace-layout{grid-template-columns:1fr}}@media(max-width:760px){.shell{grid-template-columns:1fr;padding:12px}.side{position:static;height:auto}.side nav{grid-template-columns:repeat(2,1fr)}.sidefoot{display:none}.hero,.project-hero{flex-direction:column;align-items:flex-start}.score{width:100%}.grid,.recent,.project-grid{grid-template-columns:1fr}.topbar,.sectionhead,.next-guide{flex-direction:column;align-items:stretch}.welcome{padding:25px}.learning-path{grid-template-columns:1fr}}@media(max-width:480px){.stats{grid-template-columns:1fr}.hero,.project-hero{padding:24px}}
</style>
</head>
<body><div id="app"></div><script type="module" src="./app.js"></script></body>
</html>

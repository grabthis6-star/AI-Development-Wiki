<!doctype html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="description" content="GuideFlow 개발 기술과 AI 협업 노하우"><title>GuideFlow Knowledge Base</title>
<style>
:root{font-family:Inter,Pretendard,"Noto Sans KR",system-ui,sans-serif;color:#eef4ff;background:#07111f;--line:#ffffff20;--muted:#a9b7cc;--blue:#8fd7ff;--mint:#9fe6d0;--panel:#0d1b2e}*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;min-width:320px;min-height:100vh;background:radial-gradient(circle at 90% 0,#06394a 0,transparent 32%),radial-gradient(circle at 0 20%,#251a54 0,transparent 34%),#07111f}button,a{font:inherit;color:inherit}.wrap{width:min(1080px,calc(100% - 36px));margin:auto;padding:18px 0 90px}.top{display:flex;align-items:center;justify-content:space-between;gap:18px;padding:7px 0 20px}.brand{display:flex;align-items:center;gap:11px;border:0;background:transparent;color:#eef4ff;font-weight:900;cursor:pointer}.logo{width:40px;height:40px;display:grid;place-items:center;border-radius:12px;background:linear-gradient(135deg,#745cff,#22d3ee);font-size:20px}.nav{display:flex;gap:5px}.nav button,.back{border:0;background:transparent;color:var(--muted);padding:9px 10px;cursor:pointer}.nav button:hover,.back:hover{color:#fff}.hero{padding:clamp(24px,4vw,38px);border:1px solid #3abff866;border-radius:24px;background:linear-gradient(135deg,#193764e6,#12304de6)}.eyebrow,.label{display:block;margin:0 0 10px;color:var(--blue);font-size:12px;font-weight:900;letter-spacing:.13em}.hero h1,.page-title{max-width:850px;margin:0;font-size:clamp(31px,5vw,50px);line-height:1.13;letter-spacing:-.04em}.hero>p{max-width:760px;margin:15px 0 22px;color:#c4d0e2;line-height:1.7}.actions{display:flex;gap:8px;flex-wrap:wrap}.btn{display:inline-flex;align-items:center;justify-content:center;min-height:45px;padding:0 15px;border:1px solid #ffffff2f;border-radius:12px;background:#ffffff0d;text-decoration:none;font-weight:850;cursor:pointer}.btn:hover{background:#ffffff18}.btn.primary{border-color:#fff;background:#fff;color:#10203a}.intro{margin:31px 0 14px}.intro h2{margin:0 0 7px;font-size:27px}.intro p,.page-copy,.card p,.detail p,.context p,.context li{margin:0;color:var(--muted);line-height:1.72}.doc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:13px}.doc-card,.card,.block,.detail-head,.template{border:1px solid var(--line);border-radius:19px;background:#0d1b2ed9}.doc-card{padding:22px}.doc-card>span{font-size:30px}.doc-card h2{margin:14px 0 8px;font-size:20px}.doc-card p{min-height:80px;margin-bottom:17px}.doc-card .btn{min-height:40px;padding:0 12px;font-size:14px}.page-head{padding:14px 0 25px}.group{margin:24px 0 34px}.group-head{margin:0 0 12px}.group-head h2{margin:0 0 5px;font-size:24px}.group-head p{margin:0;color:var(--muted)}.card-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:13px}.card{padding:21px;color:white;text-align:left;cursor:pointer;transition:.18s}.card:hover{transform:translateY(-3px);border-color:#56b7ff88}.card span{font-size:28px}.card h3{margin:13px 0 7px;font-size:19px}.card strong{display:block;margin-top:16px;color:#81c9ff}.detail,.context{max-width:850px}.detail-head,.block{padding:25px}.detail-head h1{margin:14px 0 9px;font-size:clamp(31px,5vw,49px)}.block{margin-top:13px}.block h2{margin:0 0 9px;font-size:20px}.flow{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-top:12px}.flow span{padding:8px 11px;border:1px solid #ffffff24;border-radius:10px;background:#ffffff09;color:#dbe8f7}.flow b{color:#6fc9ff}.code,.prompt{margin:12px 0 0;padding:16px;border-radius:12px;background:#06101d;color:#d9e7fa;white-space:pre-wrap;overflow:auto;line-height:1.6}.checklist{list-style:none;padding:0;margin:10px 0 0}.checklist li{margin:8px 0;color:#c9d5e5}.checklist li:before{content:'□';margin-right:9px;color:var(--mint)}.reuse{color:var(--mint)!important}.template-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-top:18px}.template{padding:21px}.template h3{margin:0 0 8px}.template .prompt{font-size:14px;max-height:190px}.toast{position:fixed;right:20px;bottom:75px;padding:12px 16px;border-radius:11px;background:#fff;color:#10203a;font-weight:800;box-shadow:0 12px 35px #0008}.mobile-nav{display:none;position:fixed;left:10px;right:10px;bottom:10px;z-index:10;padding:7px;border:1px solid #ffffff26;border-radius:15px;background:#091526ee;backdrop-filter:blur(12px);grid-template-columns:repeat(3,1fr);gap:4px}.mobile-nav button{border:0;border-radius:10px;background:transparent;color:#c5d2e2;padding:10px 4px;font-size:13px}.hidden{display:none}@media(max-width:900px){.doc-grid,.card-grid{grid-template-columns:1fr 1fr}.template-grid{grid-template-columns:1fr}}@media(max-width:720px){.wrap{width:min(100% - 24px,1080px)}.top{padding-bottom:13px}.top .nav{display:none}.brand{font-size:14px}.hero{padding:23px 20px;border-radius:19px}.hero h1{font-size:31px}.hero>p{font-size:15px;margin:13px 0 18px}.hero .btn{width:100%}.doc-grid,.card-grid{grid-template-columns:1fr}.doc-card p{min-height:0}.doc-card .btn{width:auto}.mobile-nav{display:grid}.detail-head,.block{padding:20px}.flow{align-items:stretch;flex-direction:column}.flow b{display:none}.flow span{text-align:center}.page-title{font-size:34px}}
</style></head><body><main class="wrap"><header class="top"><button class="brand" data-route="home"><span class="logo">⚡</span><span>GuideFlow Knowledge Base</span></button><nav class="nav"><button data-route="context">Start Here</button><button data-route="tech">개발 기술</button><button data-route="ai">AI 협업</button></nav></header><div id="app"></div></main><nav class="mobile-nav"><button data-route="home">처음</button><button data-route="tech">개발 기술</button><button data-route="ai">AI 협업</button></nav><div id="toast" class="toast hidden" role="status"></div>
<script type="module">
import { project, techGroups, techTopics, aiTopics, aiTemplates } from './knowledge-data.js'
const app=document.querySelector('#app'),toast=document.querySelector('#toast')
function go(route){location.hash=route==='home'?'':route;render()}
function flash(text){toast.textContent=text;toast.classList.remove('hidden');setTimeout(()=>toast.classList.add('hidden'),1600)}
async function copy(text){try{await navigator.clipboard.writeText(text);flash('복사했습니다.')}catch{flash('복사하지 못했습니다.')}}
function home(){app.innerHTML=`<section class="hero"><span class="eyebrow">초보자를 위한 AI 개발 가이드 · v${project.version}</span><h1>코드를 몰라도 AI와 프로그램을 만들 수 있습니다.</h1><p>어떤 프로그램을 설치해야 하는지, 왜 필요한지, AI에게 무엇을 보여주고 어떻게 요청해야 하는지를 GuideFlow 제작 경험으로 안내합니다.</p><div class="actions"><button class="btn primary" data-route="tech">준비물부터 확인하기 →</button><button class="btn" data-copy="handoff">AI 시작문 복사</button></div></section><section class="intro"><h2>이 세 가지만 알면 시작할 수 있어요</h2><p>처음이라면 왼쪽부터 읽으세요. 구현 기술과 코드는 AI가 맡고, 사용자는 준비·전달·확인 방법을 익힙니다.</p></section><section class="doc-grid"><article class="doc-card"><span>🧭</span><h2>1. 우리가 만들려는 것</h2><p>GuideFlow의 목적과 가벼운 프로그램을 만들기 위해 지켜야 할 원칙을 확인합니다.</p><div class="actions"><button class="btn primary" data-route="context">읽기</button><a class="btn" href="./GUIDEFLOW_CONTEXT.md" download>원문 저장</a></div></article><article class="doc-card"><span>🧰</span><h2>2. 무엇을 준비해야 하나요?</h2><p>프로젝트 폴더, Codex, Node.js, Git 등 필요한 도구와 설치 시점을 쉽게 설명합니다.</p><div class="actions"><button class="btn primary" data-route="tech">준비 가이드</button><a class="btn" href="./TECH_INDEX.md" download>원문 저장</a></div></article><article class="doc-card"><span>🤝</span><h2>3. AI에게 무엇을 줘야 하나요?</h2><p>아이디어, 스크린샷, 오류와 완료 기준을 전달하는 방법과 복사 가능한 요청 양식입니다.</p><div class="actions"><button class="btn primary" data-route="ai">협업 가이드</button><a class="btn" href="./AI_RULES.md" download>원문 저장</a></div></article></section>`}
function context(){app.innerHTML=`<article class="context"><button class="back" data-route="home">← 처음으로</button><header class="detail-head"><span class="eyebrow">START HERE · ${project.updatedAt}</span><h1 class="page-title">GuideFlow를 새 AI에게 전달하는 문서</h1><p>${project.purpose}</p><div class="actions" style="margin-top:18px"><button class="btn primary" data-copy="handoff">AI 시작문 복사</button><a class="btn" href="./GUIDEFLOW_CONTEXT.md" download>전체 문서 저장</a></div></header><section class="block"><h2>GuideFlow가 해결하는 문제</h2><p>영상 아이디어가 있어도 기존 편집 프로그램은 무겁게 느껴져 시작을 미루게 됩니다. GuideFlow는 본편집 전에 캡처 이미지로 전체 흐름을 빠르게 잡아 그 시작 장벽을 낮춥니다.</p></section><section class="block"><h2>작업 흐름</h2><div class="flow"><span>아이디어</span><b>→</b><span>캡처·붙여넣기</span><b>→</b><span>순서·시간 조정</span><b>→</b><span>재생 확인</span><b>→</b><span>본편집</span></div></section><section class="block"><h2>제품 원칙</h2><ul class="checklist"><li>Premiere처럼 복잡한 편집기를 만들지 않습니다.</li><li>기능 수보다 빠른 접근과 가벼운 사용감을 우선합니다.</li><li>요청하지 않은 기능이나 기술을 임의로 늘리지 않습니다.</li><li>계획보다 확인 가능한 결과물을 먼저 만듭니다.</li></ul></section><section class="block"><h2>완료를 판단하는 네 단계</h2><div class="flow"><span>구현</span><b>→</b><span>GitHub 커밋</span><b>→</b><span>배포 성공</span><b>→</b><span>브라우저 동작</span></div></section><section class="block"><h2>새 작업 시작문</h2><pre class="prompt">${project.handoff}</pre><button class="btn" style="margin-top:12px" data-copy="handoff">문장 복사</button></section></article>`}
function techList(){app.innerHTML=`<section class="page-head"><button class="back" data-route="home">← 처음으로</button><span class="eyebrow">TECH_INDEX.md</span><h1 class="page-title">AI와 만들기 위한 준비 가이드</h1><p class="page-copy">코드를 배우는 목록이 아닙니다. 사용자가 무엇을 준비하고, 언제 설치하고, AI에게 무엇을 전달해야 하는지 안내합니다.</p></section>${techGroups.map(group=>`<section class="group"><header class="group-head"><h2>${group.title}</h2><p>${group.description}</p></header><div class="card-grid">${techTopics.filter(t=>t.group===group.id).map(t=>`<button class="card" data-tech="${t.id}"><span>${t.icon}</span><h3>${t.title}</h3><p>${t.summary}</p><strong>준비·확인·AI 요청 방법 →</strong></button>`).join('')}</div></section>`).join('')}`}
function techDetail(id){const t=techTopics.find(x=>x.id===id);if(!t)return techList();app.innerHTML=`<article class="detail"><button class="back" data-route="tech">← 준비 목록</button><header class="detail-head"><span style="font-size:36px">${t.icon}</span><span class="eyebrow">사용자 준비 가이드</span><h1>${t.title}</h1><p>${t.summary}</p></header><section class="block"><span class="label">언제 준비하나요?</span><h2>GuideFlow에서는 언제 필요했나요?</h2><p>${t.place}</p></section><section class="block"><span class="label">도구의 역할</span><h2>무슨 작용을 하나요?</h2><p>${t.why}</p></section><section class="block"><span class="label">초보자 설명</span><h2>쉽게 비유하면</h2><p>${t.easy}</p></section><section class="block"><span class="label">사용자가 할 순서</span><h2>어떻게 준비하나요?</h2><div class="flow">${t.flow.map((x,i)=>`<span>${x}</span>${i<t.flow.length-1?'<b>→</b>':''}`).join('')}</div></section><section class="block"><span class="label">설치·확인·전달 예시</span><h2>무엇을 입력하거나 AI에게 주나요?</h2><pre class="code"><code>${escapeHtml(t.code)}</code></pre></section><section class="block"><span class="label">GuideFlow 시행착오</span><h2>어디에서 막혔나요?</h2><p>${t.problem}</p></section><section class="block"><span class="label">안전한 해결 순서</span><h2>어떻게 해결하나요?</h2><p class="reuse">${t.solution}</p></section><section class="block"><span class="label">사용자가 직접 확인</span><h2>준비 완료 체크리스트</h2><ul class="checklist">${t.checks.map(x=>`<li>${x}</li>`).join('')}</ul></section><section class="block"><span class="label">재사용</span><h2>다른 프로그램에도 필요한가요?</h2><p>${t.reuse}</p></section><section class="block"><span class="label">복사해서 사용</span><h2>AI에게 바로 보내는 문장</h2><pre class="prompt">${t.prompt}</pre><button class="btn" style="margin-top:12px" data-copy-tech="${t.id}">문장 복사</button></section></article>`}
function aiList(){app.innerHTML=`<section class="page-head"><button class="back" data-route="home">← 처음으로</button><span class="eyebrow">AI_RULES.md</span><h1 class="page-title">실패에서 만든 AI 협업 규칙</h1><p class="page-copy">원칙을 읽고 끝내지 않고 실제 상황에서 바로 복사할 수 있는 요청 양식까지 제공합니다.</p></section><section class="card-grid">${aiTopics.map((t,i)=>`<button class="card" data-ai="${i}"><span>${t.icon}</span><h3>${t.title}</h3><p>${t.summary}</p><strong>사례와 요청문 →</strong></button>`).join('')}</section><section class="intro"><h2>상황별 요청 양식</h2><p>지금 하고 있는 작업에 맞는 양식을 복사해 빈칸만 채우세요.</p></section><section class="template-grid">${aiTemplates.map((t,i)=>`<article class="template"><h3>${t.title}</h3><p>${t.description}</p><pre class="prompt">${t.prompt}</pre><button class="btn" style="margin-top:11px" data-copy-template="${i}">양식 복사</button></article>`).join('')}</section>`}
function aiDetail(index){const t=aiTopics[index];if(!t)return aiList();app.innerHTML=`<article class="detail"><button class="back" data-route="ai">← 협업 목록</button><header class="detail-head"><span style="font-size:36px">${t.icon}</span><span class="eyebrow">AI COLLABORATION CASE</span><h1>${t.title}</h1><p>${t.summary}</p></header><section class="block"><span class="label">실제 시행착오</span><h2>왜 문제가 됐나요?</h2><p>${t.problem}</p></section><section class="block"><span class="label">재사용 규칙</span><h2>다음부터 어떻게 해야 하나요?</h2><p class="reuse">${t.rule}</p></section><section class="block"><span class="label">복사해서 사용</span><h2>AI에게 바로 쓰는 문장</h2><pre class="prompt">${t.prompt}</pre><button class="btn" style="margin-top:12px" data-copy-ai="${index}">문장 복사</button></section></article>`}
function escapeHtml(value){return value.replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;')}
function render(){const [page,arg]=location.hash.slice(1).split('/');if(page==='context')context();else if(page==='tech'&&arg)techDetail(arg);else if(page==='tech')techList();else if(page==='ai'&&arg)aiDetail(Number(arg));else if(page==='ai')aiList();else home();bind();scrollTo(0,0)}
function bind(){document.querySelectorAll('[data-route]').forEach(x=>x.onclick=()=>go(x.dataset.route));document.querySelectorAll('[data-tech]').forEach(x=>x.onclick=()=>go('tech/'+x.dataset.tech));document.querySelectorAll('[data-ai]').forEach(x=>x.onclick=()=>go('ai/'+x.dataset.ai));document.querySelectorAll('[data-copy="handoff"]').forEach(x=>x.onclick=()=>copy(project.handoff));document.querySelectorAll('[data-copy-tech]').forEach(x=>x.onclick=()=>copy(techTopics.find(t=>t.id===x.dataset.copyTech).prompt));document.querySelectorAll('[data-copy-ai]').forEach(x=>x.onclick=()=>copy(aiTopics[Number(x.dataset.copyAi)].prompt));document.querySelectorAll('[data-copy-template]').forEach(x=>x.onclick=()=>copy(aiTemplates[Number(x.dataset.copyTemplate)].prompt))}
addEventListener('hashchange',render);render()
</script></body></html>

function flash(text){toast.textContent=text;toast.classList.remove('hidden');setTimeout(()=>toast.classList.add('hidden'),1800)}
async function copy(text){try{await navigator.clipboard.writeText(text);flash('복사했습니다.')}catch{flash('복사하지 못했습니다.')}}
function home(){app.innerHTML='<section class="start"><p class="eyebrow">START HERE · AI HANDOFF</p><h1>새 AI에게 GuideFlow의 맥락을 한 번에 전달하세요.</h1><p>GuideFlow는 캡처 이미지를 붙여 넣어 약 5분 안에 영상 아이디어를 스케치하는 가벼운 도구입니다. 여기에는 기능을 만들며 배운 기술과 AI 협업 규칙만 남겼습니다.</p><div class="actions"><button class="btn primary" data-route="context">Start Here 읽기 →</button><button class="btn" data-copy>AI 시작문 복사</button><a class="btn" href="./GUIDEFLOW_CONTEXT.md" download>첨부 문서 저장</a></div></section><section class="intro"><h2>필요한 곳으로 바로 이동하세요.</h2><p>처음 시작하면 Start Here, 기능을 만들 때는 개발 기술, AI와 작업할 때는 협업 노하우를 보면 됩니다.</p></section><section class="grid"><button class="door" data-route="tech"><span class="icon">🖼️</span><h2>GuideFlow 개발 기술</h2><p>붙여넣기·교체·드래그, 장면 관리, 재생, 내보내기와 배포를 실제 문제 중심으로 설명합니다.</p><strong>기술 카드 보기 →</strong></button><button class="door" data-route="ai"><span class="icon">🤖</span><h2>AI 협업 노하우</h2><p>실제 실패 사례를 바탕으로 작업 범위, 기존 기능 보호와 정확한 완료 검증 방법을 설명합니다.</p><strong>협업 사례 보기 →</strong></button></section>'}
function context(){app.innerHTML='<article class="context"><button class="back" data-route="home">← 처음으로</button><section class="detail-head"><p class="eyebrow">START HERE</p><h1 class="page-title">GuideFlow를 새 AI에게 전달하는 문서</h1><p>아래 내용만 이해하면 긴 채팅을 다시 설명하지 않고 다음 작업을 시작할 수 있습니다.</p><div class="actions" style="margin-top:20px"><button class="btn primary" data-copy>AI 시작문 복사</button><a class="btn" href="./GUIDEFLOW_CONTEXT.md" download>전체 문서 저장</a></div></section><section class="block"><h2>GuideFlow의 목적</h2><p>완성 영상을 만드는 편집기가 아닙니다. 인터넷에서 찾은 이미지와 캡처를 붙여 넣고 순서·위치·크기·시간을 조정해 약 5분 안에 영상의 전체 느낌을 스케치합니다.</p></section><section class="block"><h2>작업 흐름</h2><ol><li>아이디어가 떠오릅니다.</li><li>참고 화면을 캡처해 Ctrl+V로 붙여 넣습니다.</li><li>장면 순서와 시간을 빠르게 조정합니다.</li><li>재생으로 전체 흐름을 확인합니다.</li><li>나중에 본편집 프로그램에서 이 가이드를 보며 완성합니다.</li></ol></section><section class="block"><h2>반드시 지킬 제품 원칙</h2><ul><li>Premiere처럼 복잡한 편집기를 만들지 않습니다.</li><li>기능 수보다 빠른 접근과 가벼운 사용감을 우선합니다.</li><li>사용자가 요청하지 않은 기능과 기술을 임의로 늘리지 않습니다.</li><li>설명과 계획보다 확인 가능한 결과물을 먼저 만듭니다.</li><li>기존 기능을 보호하고 작은 범위로 수정합니다.</li></ul></section><section class="block"><h2>AI와 사용자의 역할</h2><p>사용자는 제품의 느낌, 우선순위와 실제 사용 피드백을 담당합니다. AI는 저장소 확인, 구현, 오류 분석, 검사, 커밋, 배포 확인과 문서화를 직접 담당합니다.</p></section><section class="block"><h2>완료를 판단하는 네 단계</h2><ol><li>코드가 실제로 구현됐는가</li><li>GitHub에 커밋됐는가</li><li>배포가 성공했는가</li><li>공개 주소에서 화면과 기능을 직접 확인했는가</li></ol></section><section class="block"><h2>새 작업 시작문</h2><pre class="prompt">'+handoff+'</pre><button class="btn" style="margin-top:14px" data-copy>이 문장 복사</button></section></article>'}
function list(type){const data=type==='tech'?topics:aiTopics,title=type==='tech'?'기능을 만들며 배운 기술':'실패에서 만든 AI 협업 규칙',copyText=type==='tech'?'기술 이름보다 실제로 해결한 문제를 기준으로 정리했습니다.':'GuideFlow에서 실제로 막혔던 상황과 다음 프로젝트에서 바로 사용할 요청문입니다.';app.innerHTML='<section class="page-head"><button class="back" data-route="home">← 처음으로</button><p class="eyebrow">'+(type==='tech'?'GUIDEFLOW DEVELOPMENT':'AI COLLABORATION')+'</p><h1 class="page-title">'+title+'</h1><p class="page-copy">'+copyText+'</p></section><section class="topic-grid">'+data.map((t,i)=>'<button class="topic" data-item="'+type+':'+i+'"><span>'+t.icon+'</span><h2>'+t.title+'</h2><p>'+t.summary+'</p><strong>자세히 보기 →</strong></button>').join('')+'</section>'}
function detail(type,i){const t=(type==='tech'?topics:aiTopics)[i];app.innerHTML='<article class="detail"><button class="back" data-route="'+type+'">← 목록으로</button><header class="detail-head"><span class="icon">'+t.icon+'</span><p class="eyebrow">'+(type==='tech'?'GUIDEFLOW FEATURE':'AI COLLABORATION CASE')+'</p><h1>'+t.title+'</h1><p>'+t.summary+'</p></header>'+(type==='tech'?'<section class="block"><h2>왜 필요했나요?</h2><p>'+t.why+'</p></section><section class="block"><h2>쉽게 설명하면</h2><p>'+t.how+'</p></section><section class="block"><h2>실제로 주의할 문제</h2><p>'+t.problem+'</p></section><section class="block"><h2>다른 프로그램에서 재사용</h2><p class="reuse">'+t.reuse+'</p></section>':'<section class="block"><h2>왜 문제가 됐나요?</h2><p>'+t.problem+'</p></section><section class="block"><h2>다음부터 지킬 규칙</h2><p class="reuse">'+t.rule+'</p></section><section class="block"><h2>AI에게 바로 쓰는 문장</h2><pre class="prompt">'+t.prompt+'</pre><button class="btn" style="margin-top:14px" data-copy-item="'+i+'">문장 복사</button></section>')+'</article>'}
function render(){const raw=location.hash.slice(1)||'home',parts=raw.split('/');if(parts[0]==='context')context();else if(parts[0]==='tech'&&parts[1])detail('tech',Number(parts[1]));else if(parts[0]==='ai'&&parts[1])detail('ai',Number(parts[1]));else if(parts[0]==='tech'||parts[0]==='ai')list(parts[0]);else home();document.querySelectorAll('[data-route]').forEach(x=>x.onclick=()=>go(x.dataset.route));document.querySelectorAll('[data-copy]').forEach(x=>x.onclick=()=>copy(handoff));document.querySelectorAll('[data-item]').forEach(x=>x.onclick=()=>go(x.dataset.item.replace(':','/')));document.querySelectorAll('[data-copy-item]').forEach(x=>x.onclick=()=>copy(aiTopics[Number(x.dataset.copyItem)].prompt));window.scrollTo(0,0)}
window.addEventListener('hashchange',render);render();
</script></body></html>

<!doctype html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="description" content="GuideFlow 개발 기술과 AI 협업 노하우"><title>GuideFlow Knowledge Base</title>
<style>
:root{font-family:Inter,Pretendard,"Noto Sans KR",system-ui,sans-serif;color:#eef4ff;background:#07111f;--line:#ffffff20;--muted:#a9b7cc;--blue:#8fd7ff;--mint:#9fe6d0;--panel:#0d1b2e}*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;min-width:320px;min-height:100vh;background:radial-gradient(circle at 90% 0,#06394a 0,transparent 32%),radial-gradient(circle at 0 20%,#251a54 0,transparent 34%),#07111f}button,a{font:inherit;color:inherit}.wrap{width:min(1080px,calc(100% - 36px));margin:auto;padding:18px 0 90px}.top{display:flex;align-items:center;justify-content:space-between;gap:18px;padding:7px 0 20px}.brand{display:flex;align-items:center;gap:11px;border:0;background:transparent;color:#eef4ff;font-weight:900;cursor:pointer}.logo{width:40px;height:40px;display:grid;place-items:center;border-radius:12px;background:linear-gradient(135deg,#745cff,#22d3ee);font-size:20px}.nav{display:flex;gap:5px}.nav button,.back{border:0;background:transparent;color:var(--muted);padding:9px 10px;cursor:pointer}.nav button:hover,.back:hover{color:#fff}.hero{padding:clamp(24px,4vw,38px);border:1px solid #3abff866;border-radius:24px;background:linear-gradient(135deg,#193764e6,#12304de6)}.eyebrow,.label{display:block;margin:0 0 10px;color:var(--blue);font-size:12px;font-weight:900;letter-spacing:.13em}.hero h1,.page-title{max-width:850px;margin:0;font-size:clamp(31px,5vw,50px);line-height:1.13;letter-spacing:-.04em}.hero>p{max-width:760px;margin:15px 0 22px;color:#c4d0e2;line-height:1.7}.actions{display:flex;gap:8px;flex-wrap:wrap}.btn{display:inline-flex;align-items:center;justify-content:center;min-height:45px;padding:0 15px;border:1px solid #ffffff2f;border-radius:12px;background:#ffffff0d;text-decoration:none;font-weight:850;cursor:pointer}.btn:hover{background:#ffffff18}.btn.primary{border-color:#fff;background:#fff;color:#10203a}.intro{margin:31px 0 14px}.intro h2{margin:0 0 7px;font-size:27px}.intro p,.page-copy,.card p,.detail p,.context p,.context li{margin:0;color:var(--muted);line-height:1.72}.doc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:13px}.doc-card,.card,.block,.detail-head,.template{border:1px solid var(--line);border-radius:19px;background:#0d1b2ed9}.doc-card{padding:22px}.doc-card>span{font-size:30px}.doc-card h2{margin:14px 0 8px;font-size:20px}.doc-card p{min-height:100px;margin-bottom:17px}.doc-card .btn{min-height:40px;padding:0 12px;font-size:14px}.page-head{padding:14px 0 25px}.group{margin:24px 0 34px}.group-head{margin:0 0 12px}.group-head h2{margin:0 0 5px;font-size:24px}.group-head p{margin:0;color:var(--muted)}.card-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:13px}.card{padding:21px;color:white;text-align:left;cursor:pointer;transition:.18s}.card:hover{transform:translateY(-3px);border-color:#56b7ff88}.card span{font-size:28px}.card h3{margin:13px 0 7px;font-size:19px}.card strong{display:block;margin-top:16px;color:#81c9ff}.detail,.context{max-width:850px}.detail-head,.block{padding:25px}.detail-head h1{margin:14px 0 9px;font-size:clamp(31px,5vw,49px)}.block{margin-top:13px}.block h2{margin:0 0 9px;font-size:20px}.flow{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-top:12px}.flow span{padding:8px 11px;border:1px solid #ffffff24;border-radius:10px;background:#ffffff09;color:#dbe8f7}.flow b{color:#6fc9ff}.code,.prompt{margin:12px 0 0;padding:16px;border-radius:12px;background:#06101d;color:#d9e7fa;white-space:pre-wrap;overflow:auto;line-height:1.6}.checklist{list-style:none;padding:0;margin:10px 0 0}.checklist li{margin:8px 0;color:#c9d5e5}.checklist li:before{content:'□';margin-right:9px;color:var(--mint)}.reuse{color:var(--mint)!important}.template-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-top:18px}.template{padding:21px}.template h3{margin:0 0 8px}.template .prompt{font-size:14px;max-height:190px}.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 22px}.filter-bar button{border:1px solid var(--line);border-radius:999px;background:#ffffff08;color:#c8d4e4;padding:9px 13px;cursor:pointer}.filter-bar button.active{background:#fff;color:#10203a}.tool-meta{display:flex;gap:7px;flex-wrap:wrap;margin:12px 0}.pill{padding:5px 8px;border-radius:999px;background:#ffffff0d;color:#bcd1e7;font-size:12px}.provider{color:var(--blue);font-size:12px;font-weight:900}.recipe-tools{display:flex;gap:6px;flex-wrap:wrap;margin:12px 0}.recipe-tools span{padding:7px 9px;border-radius:9px;background:#06101d;color:#bfe3ff}.official{color:#92d9ff}.toast{position:fixed;right:20px;bottom:75px;padding:12px 16px;border-radius:11px;background:#fff;color:#10203a;font-weight:800;box-shadow:0 12px 35px #0008}.mobile-nav{display:none;position:fixed;left:10px;right:10px;bottom:10px;z-index:10;padding:7px;border:1px solid #ffffff26;border-radius:15px;background:#091526ee;backdrop-filter:blur(12px);grid-template-columns:repeat(6,1fr);gap:4px}.mobile-nav button{border:0;border-radius:10px;background:transparent;color:#c5d2e2;padding:10px 2px;font-size:12px}.hidden{display:none}@media(max-width:900px){.doc-grid,.card-grid{grid-template-columns:1fr 1fr}.template-grid{grid-template-columns:1fr}}@media(max-width:720px){.wrap{width:min(100% - 24px,1080px)}.top{padding-bottom:13px}.top .nav{display:none}.brand{font-size:14px}.hero{padding:23px 20px;border-radius:19px}.hero h1{font-size:31px}.hero>p{font-size:15px;margin:13px 0 18px}.hero .btn{width:100%}.doc-grid,.card-grid{grid-template-columns:1fr}.doc-card p{min-height:0}.doc-card .btn{width:auto}.mobile-nav{display:grid}.detail-head,.block{padding:20px}.flow{align-items:stretch;flex-direction:column}.flow b{display:none}.flow span{text-align:center}.page-title{font-size:34px}}
</style></head><body><main class="wrap"><header class="top"><button class="brand" data-route="home"><span class="logo">⚡</span><span>GuideFlow Knowledge Base</span></button><nav class="nav"><button data-route="tech">준비</button><button data-route="ai">AI 맡기기</button><button data-route="tools">도구</button><button data-route="concepts">용어</button><button data-route="automation">자동화</button><button data-route="practical">실전</button></nav></header><div id="app"></div></main><nav class="mobile-nav"><button data-route="home">처음</button><button data-route="tech">준비</button><button data-route="ai">맡기기</button><button data-route="concepts">용어</button><button data-route="automation">자동화</button><button data-route="practical">실전</button></nav><div id="toast" class="toast hidden" role="status"></div>
<script type="module">
import { project, techGroups, techTopics, aiTopics, aiTemplates, conceptTopics, automationLevels, workflowRecipes, practicalGuides, toolPurposes, aiTools, toolRecipes } from './knowledge-data.js'
const app=document.querySelector('#app'),toast=document.querySelector('#toast')
function go(route){location.hash=route==='home'?'':route;render()}
function flash(text){toast.textContent=text;toast.classList.remove('hidden');setTimeout(()=>toast.classList.add('hidden'),1600)}
async function copy(text){try{let copied=false;if(navigator.clipboard&&window.isSecureContext){try{await navigator.clipboard.writeText(text);copied=true}catch{}}if(!copied){const area=document.createElement('textarea');area.value=text;area.setAttribute('readonly','');area.style.position='fixed';area.style.opacity='0';document.body.appendChild(area);area.select();copied=document.execCommand('copy');area.remove()}flash(copied?'복사했습니다.':'복사하지 못했습니다.')}catch{flash('복사하지 못했습니다.')}}
function home(){app.innerHTML=`<section class="hero"><span class="eyebrow">초보자를 위한 AI 프로그램 제작 가이드 · v${project.version}</span><h1>AI와 프로그램 만들기, 어디서부터 시작할지 안내합니다.</h1><p>사용자가 준비할 것, AI에게 전달할 것, 필요한 도구와 자동화 범위를 GuideFlow 제작 경험과 실제 사용자 질문을 바탕으로 정리했습니다.</p><div class="actions"><button class="btn primary" data-route="context">새 AI에게 프로젝트 넘기기 →</button><button class="btn" data-route="tools">목적에 맞는 도구 찾기</button></div></section><section class="intro"><h2>지금 궁금한 질문을 고르세요</h2><p>처음부터 모두 공부할 필요가 없습니다. 현재 막힌 질문 하나에서 시작하면 됩니다.</p></section><section class="doc-grid"><article class="doc-card"><span>🧰</span><h2>무엇을 준비해야 하나요?</h2><p>프로젝트 폴더, AI 작업 환경, Node.js·Git과 선택 설치 도구를 쉽게 설명합니다.</p><button class="btn primary" data-route="tech">준비 가이드</button></article><article class="doc-card"><span>🤝</span><h2>AI에게 어떻게 맡기나요?</h2><p>아이디어, 화면, 오류, 유지 기능과 완료 기준을 전달하는 방법입니다.</p><button class="btn primary" data-route="ai">협업 가이드</button></article><article class="doc-card"><span>🧭</span><h2>어떤 AI·도구를 쓸까요?</h2><p>프로그램 개발, 조사, 이미지·음성·영상과 반복 업무에 맞는 도구를 고릅니다.</p><button class="btn primary" data-route="tools">도구 찾기</button></article><article class="doc-card"><span>🔤</span><h2>CLI·API·MCP가 뭔가요?</h2><p>플러그인, 스킬, 에이전트와 하네스까지 서로의 차이를 초보자 언어로 설명합니다.</p><button class="btn primary" data-route="concepts">용어 이해</button></article><article class="doc-card"><span>🔁</span><h2>어디까지 자동화할까요?</h2><p>초안 생성부터 예약 실행과 사람의 최종 검수까지 단계별로 선택합니다.</p><button class="btn primary" data-route="automation">자동화 설계</button></article><article class="doc-card"><span>🧪</span><h2>실제로 운영할 때 뭘 확인하나요?</h2><p>설치·세션·권한·중간 데이터·미디어 검수·비용 제한을 실제 순서로 확인합니다.</p><button class="btn primary" data-route="practical">실전 운영</button></article></section>`}
function context(){app.innerHTML=`<article class="context"><button class="back" data-route="home">← 처음으로</button><header class="detail-head"><span class="eyebrow">START HERE · ${project.updatedAt}</span><h1 class="page-title">GuideFlow를 새 AI에게 전달하는 문서</h1><p>${project.purpose}</p><div class="actions" style="margin-top:18px"><button class="btn primary" data-copy="handoff">AI 시작문 복사</button><a class="btn" href="./GUIDEFLOW_CONTEXT.md" download>전체 문서 저장</a></div></header><section class="block"><h2>GuideFlow가 해결하는 문제</h2><p>영상 아이디어가 있어도 기존 편집 프로그램은 무겁게 느껴져 시작을 미루게 됩니다. GuideFlow는 본편집 전에 캡처 이미지로 전체 흐름을 빠르게 잡아 그 시작 장벽을 낮춥니다.</p></section><section class="block"><h2>작업 흐름</h2><div class="flow"><span>아이디어</span><b>→</b><span>캡처·붙여넣기</span><b>→</b><span>순서·시간 조정</span><b>→</b><span>재생 확인</span><b>→</b><span>본편집</span></div></section><section class="block"><h2>제품 원칙</h2><ul class="checklist"><li>Premiere처럼 복잡한 편집기를 만들지 않습니다.</li><li>기능 수보다 빠른 접근과 가벼운 사용감을 우선합니다.</li><li>요청하지 않은 기능이나 기술을 임의로 늘리지 않습니다.</li><li>계획보다 확인 가능한 결과물을 먼저 만듭니다.</li></ul></section><section class="block"><h2>완료를 판단하는 네 단계</h2><div class="flow"><span>구현</span><b>→</b><span>GitHub 커밋</span><b>→</b><span>배포 성공</span><b>→</b><span>브라우저 동작</span></div></section><section class="block"><h2>새 작업 시작문</h2><pre class="prompt">${project.handoff}</pre><button class="btn" style="margin-top:12px" data-copy="handoff">문장 복사</button></section></article>`}
function techList(){const starterIds=['chatgpt-projects','codex','agents-md','claude-projects','gems','notebooklm','ai-studio'];const starterTools=starterIds.map(id=>aiTools.find(t=>t.id===id)).filter(Boolean);app.innerHTML=`<section class="page-head"><button class="back" data-route="home">← 처음으로</button><span class="eyebrow">준비 가이드 · AI 도구 업데이트</span><h1 class="page-title">AI와 만들기 위한 준비 가이드</h1><p class="page-copy">모든 도구를 설치할 필요는 없습니다. 대화·기획용 AI 하나와 실제 파일을 수정할 개발 도구 하나부터 고르세요.</p></section><section class="group"><header class="group-head"><h2>0. 내 작업에 맞는 AI 환경 고르기</h2><p>새로 추가된 AI 서비스와 내부 기능 중 초보자가 먼저 알아두면 좋은 도구입니다.</p></header><div class="card-grid">${starterTools.map(t=>`<button class="card" data-tool="${t.id}"><span>${t.icon}</span><div class="provider">${t.provider} · ${t.kind}</div><h3>${t.title}</h3><p>${t.summary}</p><strong>언제 쓰는지 확인 →</strong></button>`).join('')}</div><div class="actions" style="margin-top:14px"><button class="btn primary" data-route="tools">18개 전체 AI·도구 비교하기 →</button></div></section>${techGroups.map(group=>`<section class="group"><header class="group-head"><h2>${group.title}</h2><p>${group.description}</p></header><div class="card-grid">${techTopics.filter(t=>t.group===group.id).map(t=>`<button class="card" data-tech="${t.id}"><span>${t.icon}</span><h3>${t.title}</h3><p>${t.summary}</p><strong>준비·확인·AI 요청 방법 →</strong></button>`).join('')}</div></section>`).join('')}`}
function techDetail(id){const t=techTopics.find(x=>x.id===id);if(!t)return techList();app.innerHTML=`<article class="detail"><button class="back" data-route="tech">← 준비 목록</button><header class="detail-head"><span style="font-size:36px">${t.icon}</span><span class="eyebrow">사용자 준비 가이드</span><h1>${t.title}</h1><p>${t.summary}</p></header><section class="block"><span class="label">언제 준비하나요?</span><h2>GuideFlow에서는 언제 필요했나요?</h2><p>${t.place}</p></section><section class="block"><span class="label">도구의 역할</span><h2>무슨 작용을 하나요?</h2><p>${t.why}</p></section><section class="block"><span class="label">초보자 설명</span><h2>쉽게 비유하면</h2><p>${t.easy}</p></section><section class="block"><span class="label">사용자가 할 순서</span><h2>어떻게 준비하나요?</h2><div class="flow">${t.flow.map((x,i)=>`<span>${x}</span>${i<t.flow.length-1?'<b>→</b>':''}`).join('')}</div></section><section class="block"><span class="label">설치·확인·전달 예시</span><h2>무엇을 입력하거나 AI에게 주나요?</h2><pre class="code"><code>${escapeHtml(t.code)}</code></pre></section><section class="block"><span class="label">GuideFlow 시행착오</span><h2>어디에서 막혔나요?</h2><p>${t.problem}</p></section><section class="block"><span class="label">안전한 해결 순서</span><h2>어떻게 해결하나요?</h2><p class="reuse">${t.solution}</p></section><section class="block"><span class="label">사용자가 직접 확인</span><h2>준비 완료 체크리스트</h2><ul class="checklist">${t.checks.map(x=>`<li>${x}</li>`).join('')}</ul></section><section class="block"><span class="label">재사용</span><h2>다른 프로그램에도 필요한가요?</h2><p>${t.reuse}</p></section><section class="block"><span class="label">복사해서 사용</span><h2>AI에게 바로 보내는 문장</h2><pre class="prompt">${t.prompt}</pre><button class="btn" style="margin-top:12px" data-copy-tech="${t.id}">문장 복사</button></section></article>`}
function aiList(){app.innerHTML=`<section class="page-head"><button class="back" data-route="home">← 처음으로</button><span class="eyebrow">AI_RULES.md</span><h1 class="page-title">실패에서 만든 AI 협업 규칙</h1><p class="page-copy">원칙을 읽고 끝내지 않고 실제 상황에서 바로 복사할 수 있는 요청 양식까지 제공합니다.</p></section><section class="card-grid">${aiTopics.map((t,i)=>`<button class="card" data-ai="${i}"><span>${t.icon}</span><h3>${t.title}</h3><p>${t.summary}</p><strong>사례와 요청문 →</strong></button>`).join('')}</section><section class="intro"><h2>상황별 요청 양식</h2><p>지금 하고 있는 작업에 맞는 양식을 복사해 빈칸만 채우세요.</p></section><section class="template-grid">${aiTemplates.map((t,i)=>`<article class="template"><h3>${t.title}</h3><p>${t.description}</p><pre class="prompt">${t.prompt}</pre><button class="btn" style="margin-top:11px" data-copy-template="${i}">양식 복사</button></article>`).join('')}</section>`}
function aiDetail(index){const t=aiTopics[index];if(!t)return aiList();app.innerHTML=`<article class="detail"><button class="back" data-route="ai">← 협업 목록</button><header class="detail-head"><span style="font-size:36px">${t.icon}</span><span class="eyebrow">AI COLLABORATION CASE</span><h1>${t.title}</h1><p>${t.summary}</p></header><section class="block"><span class="label">실제 시행착오</span><h2>왜 문제가 됐나요?</h2><p>${t.problem}</p></section><section class="block"><span class="label">재사용 규칙</span><h2>다음부터 어떻게 해야 하나요?</h2><p class="reuse">${t.rule}</p></section><section class="block"><span class="label">복사해서 사용</span><h2>AI에게 바로 쓰는 문장</h2><pre class="prompt">${t.prompt}</pre><button class="btn" style="margin-top:12px" data-copy-ai="${index}">문장 복사</button></section></article>`}
function conceptList(){app.innerHTML=`<section class="page-head"><button class="back" data-route="home">← 처음으로</button><span class="eyebrow">AI TOOL GLOSSARY · ${conceptTopics.length} TERMS</span><h1 class="page-title">도구 이름을 알아야 AI에게 능력을 요청할 수 있습니다.</h1><p class="page-copy">제품 이름을 외우는 대신 각 개념이 무슨 역할을 하고 사용자는 무엇을 해야 하는지 이해합니다.</p></section><section class="block"><span class="label">도구 관계 한눈에 보기</span><h2>두뇌부터 외부 서비스까지</h2><div class="flow"><span>AI 서비스<br>ChatGPT·Claude·Gemini</span><b>→</b><span>AI 모델<br>판단하는 두뇌</span><b>→</b><span>작업 도구<br>앱·CLI·에이전트</span><b>→</b><span>확장 기능<br>스킬·플러그인·MCP</span><b>→</b><span>외부 서비스<br>GitHub·Drive·DB</span></div></section><section class="card-grid" style="margin-top:18px">${conceptTopics.map(t=>`<button class="card" data-concept="${t.id}"><span>${t.icon}</span><h3>${t.title}</h3><p>${t.summary}</p><strong>사용자와 AI의 역할 보기 →</strong></button>`).join('')}</section></section>`}
function conceptDetail(id){const t=conceptTopics.find(x=>x.id===id);if(!t)return conceptList();app.innerHTML=`<article class="detail"><button class="back" data-route="concepts">← 용어 목록</button><header class="detail-head"><span style="font-size:38px">${t.icon}</span><span class="eyebrow">초보자 AI 도구 용어</span><h1>${t.title}</h1><p>${t.summary}</p></header><section class="block"><span class="label">쉽게 이해하기</span><h2>비유하면 무엇인가요?</h2><p>${t.easy}</p></section><section class="block"><span class="label">필요한 이유</span><h2>왜 알아야 하나요?</h2><p>${t.why}</p></section><section class="block"><span class="label">역할 나누기</span><h2>사용자와 AI는 무엇을 하나요?</h2><div class="template-grid"><article class="template"><h3>사용자</h3><p>${t.userRole}</p></article><article class="template"><h3>AI</h3><p>${t.aiRole}</p></article></div></section><section class="block"><span class="label">선택 기준</span><h2>언제 쓰고 언제 필요 없나요?</h2><p><strong>추천:</strong> ${t.when}</p><p style="margin-top:8px"><strong>보류:</strong> ${t.avoid}</p></section><section class="block"><span class="label">복사해서 사용</span><h2>AI에게 보내는 요청문</h2><pre class="prompt">${t.prompt}</pre><button class="btn" style="margin-top:12px" data-copy-concept="${t.id}">문장 복사</button></section></article>`}
function automationPage(){app.innerHTML=`<section class="page-head"><button class="back" data-route="home">← 처음으로</button><span class="eyebrow">HUMAN-IN-THE-LOOP AUTOMATION</span><h1 class="page-title">완전 자동화보다, 기본 틀을 빠르게 만드는 자동화</h1><p class="page-copy">카카오톡 대화에서 반복된 실사용 원칙처럼 AI가 초벌을 만들고 사용자가 품질과 방향을 최종 결정합니다.</p></section><section class="intro"><h2>자동화 다섯 단계</h2><p>처음에는 1단계에서 시작하고, 수동으로 성공한 작업만 다음 단계로 올립니다.</p></section><section class="card-grid">${automationLevels.map(x=>`<article class="card" style="cursor:default"><span>${x.level}</span><h3>${x.title}</h3><p>${x.summary}</p><div class="tool-meta"><span class="pill">사용자: ${x.user}</span><span class="pill">AI: ${x.ai}</span></div><strong>주의: ${x.risk}</strong></article>`).join('')}</section><section class="intro"><h2>프로젝트별 실전 작업 흐름</h2><p>도구 이름보다 작업의 순서와 사람이 확인할 위치를 먼저 정합니다.</p></section><section class="template-grid">${workflowRecipes.map(r=>`<article class="template"><h3>${r.icon} ${r.title}</h3><div class="flow">${r.steps.map((s,i)=>`<span>${s}</span>${i<r.steps.length-1?'<b>→</b>':''}`).join('')}</div><div class="recipe-tools">${r.tools.map(t=>`<span>${t}</span>`).join('')}</div><p class="reuse">${r.principle}</p></article>`).join('')}</section><section class="block"><span class="label">안전한 자동화 원칙</span><h2>자동화 전에 반드시 확인하세요</h2><ul class="checklist"><li>한 번도 성공하지 않은 작업을 바로 예약하지 않습니다.</li><li>API 비용 한도와 중지 방법을 먼저 정합니다.</li><li>MCP·플러그인은 필요한 것만 연결하고 권한을 확인합니다.</li><li>긴 세션과 사용하지 않는 연결은 정리합니다.</li><li>사실·저작권·품질은 사람이 최종 검수합니다.</li></ul></section>`}

function practicalList(){app.innerHTML=`<section class="page-head"><button class="back" data-route="home">← 처음으로</button><span class="eyebrow">PRACTICAL AI OPERATIONS · ${practicalGuides.length} GUIDES</span><h1 class="page-title">AI가 만들고, 사용자가 준비하고 확인하는 실전 작업법</h1><p class="page-copy">커뮤니티 경험에서 반복된 실제 어려움만 추리고, 확인되지 않은 제품 평가는 제외했습니다.</p></section><section class="card-grid">${practicalGuides.map(g=>`<button class="card" data-practical="${g.id}"><span>${g.icon}</span><h3>${g.title}</h3><p>${g.summary}</p><strong>사용자·AI 역할과 체크리스트 보기 →</strong></button>`).join('')}</section><section class="block"><span class="label">정보 사용 원칙</span><h2>커뮤니티 경험은 출발점이지 공식 사실이 아닙니다.</h2><ul class="checklist"><li>가격·기능·요구 사양은 공식 문서에서 다시 확인합니다.</li><li>특정 모델의 성능과 토큰 차이를 보편적인 사실로 단정하지 않습니다.</li><li>CAPTCHA·내부 API·심사·안전장치 우회는 안내하지 않습니다.</li><li>저작권 있는 자료의 무단 다운로드·재사용을 자동화하지 않습니다.</li></ul></section>`}
function practicalDetail(id){const g=practicalGuides.find(x=>x.id===id);if(!g)return practicalList();app.innerHTML=`<article class="detail"><button class="back" data-route="practical">← 실전 운영 목록</button><header class="detail-head"><span style="font-size:38px">${g.icon}</span><span class="eyebrow">초보자 실전 운영 가이드</span><h1>${g.title}</h1><p>${g.summary}</p></header><section class="block"><span class="label">필요한 이유</span><h2>왜 이 과정이 필요한가요?</h2><p>${g.why}</p></section><section class="block"><span class="label">역할 나누기</span><h2>사용자와 AI가 할 일</h2><div class="template-grid"><article class="template"><h3>사용자</h3><ol class="checklist">${g.userSteps.map(x=>`<li>${x}</li>`).join('')}</ol></article><article class="template"><h3>AI</h3><ol class="checklist">${g.aiSteps.map(x=>`<li>${x}</li>`).join('')}</ol></article></div></section><section class="block"><span class="label">완료 확인</span><h2>이 항목까지 확인하세요</h2><ul class="checklist">${g.check.map(x=>`<li>${x}</li>`).join('')}</ul></section><section class="block"><span class="label">복사해서 사용</span><h2>AI에게 보내는 요청문</h2><pre class="prompt">${g.prompt}</pre><button class="btn" style="margin-top:12px" data-copy-practical="${g.id}">요청문 복사</button></section></article>`}
function toolsList(purpose='all'){const filtered=purpose==='all'?aiTools:aiTools.filter(t=>t.tags.includes(purpose));app.innerHTML=`<section class="page-head"><button class="back" data-route="home">← 처음으로</button><span class="eyebrow">AI TOOL MAP · ${aiTools.length} TOOLS</span><h1 class="page-title">만들고 싶은 능력으로 도구 찾기</h1><p class="page-copy">회사 이름을 몰라도 괜찮습니다. 목적을 고르면 적합한 AI 서비스, 내부 기능과 개발 도구를 함께 보여줍니다.</p></section><nav class="filter-bar" aria-label="도구 목적 필터">${toolPurposes.map(p=>`<button class="${p.id===purpose?'active':''}" data-purpose="${p.id}">${p.label}</button>`).join('')}</nav><section class="card-grid">${filtered.map(t=>`<button class="card" data-tool="${t.id}"><span>${t.icon}</span><div class="provider">${t.provider} · ${t.kind}</div><h3>${t.title}</h3><p>${t.summary}</p><div class="tool-meta">${t.tags.slice(0,3).map(tag=>`<span class="pill">${toolPurposes.find(p=>p.id===tag)?.label||tag}</span>`).join('')}</div><strong>언제 쓰는지 확인 →</strong></button>`).join('')}</section><section class="intro"><h2>함께 쓰면 좋은 조합</h2><p>하나의 AI가 모든 일을 맡는 대신 목적에 맞는 도구를 연결합니다.</p></section><section class="template-grid">${toolRecipes.map(r=>`<article class="template"><h3>${r.title}</h3><div class="recipe-tools">${r.tools.map(x=>`<span>${x}</span>`).join('')}</div><p>${r.description}</p></article>`).join('')}</section>`}
function toolDetail(id){const t=aiTools.find(x=>x.id===id);if(!t)return toolsList();app.innerHTML=`<article class="detail"><button class="back" data-route="tools">← 도구 목록</button><header class="detail-head"><span style="font-size:38px">${t.icon}</span><span class="eyebrow">${t.provider} · ${t.kind}</span><h1>${t.title}</h1><p>${t.summary}</p><div class="tool-meta">${t.tags.map(tag=>`<span class="pill">${toolPurposes.find(p=>p.id===tag)?.label||tag}</span>`).join('')}</div></header><section class="block"><span class="label">추천 상황</span><h2>언제 사용하면 좋나요?</h2><p>${t.useWhen}</p></section><section class="block"><span class="label">불필요한 상황</span><h2>언제 사용하지 않아도 되나요?</h2><p>${t.avoidWhen}</p></section><section class="block"><span class="label">사용자 준비</span><h2>무엇을 준비해야 하나요?</h2><p>${t.needs}</p></section><section class="block"><span class="label">만들 수 있는 결과</span><h2>무엇을 얻을 수 있나요?</h2><div class="flow">${t.outputs.map(x=>`<span>${x}</span>`).join('')}</div></section><section class="block"><span class="label">바로 사용</span><h2>복사해서 보내는 요청문</h2><pre class="prompt">${t.prompt}</pre><button class="btn" style="margin-top:12px" data-copy-tool="${t.id}">요청문 복사</button></section><section class="block"><span class="label">공식 안내</span><h2>최신 기능과 사용 조건 확인</h2><p>기능과 요금제는 바뀔 수 있으므로 공식 문서에서 마지막으로 확인하세요.</p><a class="btn official" style="margin-top:12px" href="${t.url}" target="_blank" rel="noreferrer">공식 사이트 열기 ↗</a></section></article>`}
function escapeHtml(value){return value.replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;')}
function render(){const [page,arg]=location.hash.slice(1).split('/');if(page==='context')context();else if(page==='tech'&&arg)techDetail(arg);else if(page==='tech')techList();else if(page==='ai'&&arg)aiDetail(Number(arg));else if(page==='ai')aiList();else if(page==='concept'&&arg)conceptDetail(arg);else if(page==='concepts')conceptList();else if(page==='automation')automationPage();else if(page==='practical'&&arg)practicalDetail(arg);else if(page==='practical')practicalList();else if(page==='tool'&&arg)toolDetail(arg);else if(page==='tools')toolsList(arg||'all');else home();bind();scrollTo(0,0)}
function bind(){document.querySelectorAll('[data-route]').forEach(x=>x.onclick=()=>go(x.dataset.route));document.querySelectorAll('[data-tech]').forEach(x=>x.onclick=()=>go('tech/'+x.dataset.tech));document.querySelectorAll('[data-ai]').forEach(x=>x.onclick=()=>go('ai/'+x.dataset.ai));document.querySelectorAll('[data-purpose]').forEach(x=>x.onclick=()=>go('tools/'+x.dataset.purpose));document.querySelectorAll('[data-tool]').forEach(x=>x.onclick=()=>go('tool/'+x.dataset.tool));document.querySelectorAll('[data-concept]').forEach(x=>x.onclick=()=>go('concept/'+x.dataset.concept));document.querySelectorAll('[data-practical]').forEach(x=>x.onclick=()=>go('practical/'+x.dataset.practical));document.querySelectorAll('[data-copy="handoff"]').forEach(x=>x.onclick=()=>copy(project.handoff));document.querySelectorAll('[data-copy-tech]').forEach(x=>x.onclick=()=>copy(techTopics.find(t=>t.id===x.dataset.copyTech).prompt));document.querySelectorAll('[data-copy-ai]').forEach(x=>x.onclick=()=>copy(aiTopics[Number(x.dataset.copyAi)].prompt));document.querySelectorAll('[data-copy-template]').forEach(x=>x.onclick=()=>copy(aiTemplates[Number(x.dataset.copyTemplate)].prompt));document.querySelectorAll('[data-copy-tool]').forEach(x=>x.onclick=()=>copy(aiTools.find(t=>t.id===x.dataset.copyTool).prompt));document.querySelectorAll('[data-copy-concept]').forEach(x=>x.onclick=()=>copy(conceptTopics.find(t=>t.id===x.dataset.copyConcept).prompt));document.querySelectorAll('[data-copy-practical]').forEach(x=>x.onclick=()=>copy(practicalGuides.find(t=>t.id===x.dataset.copyPractical).prompt))}
addEventListener('hashchange',render);render()
</script></body></html>

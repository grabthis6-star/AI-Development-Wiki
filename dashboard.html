<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="description" content="AI와 함께 만드는 프로젝트, 지식, 프롬프트와 패턴을 한곳에서 관리하는 AI Development OS">
<title>AI Development OS</title>
<style>
:root{font-family:Inter,Pretendard,system-ui,sans-serif;color:#eef2ff;background:#070b14;--panel:#0f172acc;--panel2:#172033;--line:#94a3b82b;--muted:#9aa7bd;--accent:#8b5cf6;--accent2:#22d3ee;--good:#34d399;--warn:#fbbf24}*{box-sizing:border-box}body{margin:0;min-width:320px;min-height:100vh;background:radial-gradient(circle at 10% 0,#1e1b4b 0,transparent 34%),radial-gradient(circle at 90% 10%,#083344 0,transparent 30%),#070b14}button,input{font:inherit}.shell{max-width:1440px;margin:auto;padding:20px;display:grid;grid-template-columns:250px 1fr;gap:20px}.side{position:sticky;top:20px;height:calc(100vh - 40px);padding:20px;border:1px solid var(--line);border-radius:22px;background:#0b1020e8;backdrop-filter:blur(18px);display:flex;flex-direction:column}.brand{display:flex;gap:12px;align-items:center;margin-bottom:24px}.logo{width:44px;height:44px;border-radius:14px;display:grid;place-items:center;background:linear-gradient(135deg,var(--accent),var(--accent2));font-size:22px}.brand strong{display:block}.brand span{font-size:12px;color:var(--muted)}.nav{display:grid;gap:7px}.nav button{padding:12px 13px;border:1px solid transparent;border-radius:12px;background:transparent;color:#b7c1d4;text-align:left;cursor:pointer}.nav button:hover,.nav button.on{color:white;background:#8b5cf61f;border-color:#8b5cf655}.sidefoot{margin-top:auto;padding-top:18px;border-top:1px solid var(--line);color:#7f8ba0;font-size:12px;line-height:1.6}.main{min-width:0}.topbar{display:flex;justify-content:space-between;gap:16px;align-items:center;margin-bottom:20px}.search{flex:1;display:flex;gap:10px;align-items:center;height:52px;padding:0 16px;border:1px solid var(--line);border-radius:15px;background:#0f172acc}.search input{width:100%;border:0;outline:0;background:transparent;color:white}.pill{padding:10px 13px;border:1px solid var(--line);border-radius:999px;background:#0f172acc;color:#cbd5e1}.hero{padding:34px;border:1px solid var(--line);border-radius:24px;background:linear-gradient(135deg,#312e81aa,#0e749055);display:flex;justify-content:space-between;gap:24px;align-items:center}.hero h1{margin:0 0 10px;font-size:clamp(32px,5vw,58px);letter-spacing:-.04em}.hero p{margin:0;color:#c8d3e5;line-height:1.7;max-width:700px}.hero .score{min-width:170px;text-align:center;padding:20px;border-radius:20px;background:#02061755;border:1px solid #ffffff22}.score strong{display:block;font-size:42px}.score span{color:#cbd5e1;font-size:13px}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;margin:18px 0}.stat{padding:18px;border:1px solid var(--line);border-radius:17px;background:var(--panel)}.stat span{font-size:13px;color:var(--muted)}.stat strong{display:block;margin-top:8px;font-size:28px}.section{margin-top:22px}.sectionhead{display:flex;justify-content:space-between;align-items:end;margin-bottom:13px}.sectionhead h2{margin:0;font-size:23px}.sectionhead span{color:var(--muted);font-size:13px}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.card{padding:20px;border:1px solid var(--line);border-radius:19px;background:linear-gradient(145deg,#172033dd,#0f172acc);cursor:pointer;transition:.18s;color:white;text-align:left}.card:hover{transform:translateY(-3px);border-color:#8b5cf699}.card .icon{font-size:26px}.card .tag{display:inline-block;margin:14px 0 8px;font-size:11px;color:#c4b5fd;font-weight:800}.card h3{margin:0 0 8px;font-size:19px}.card p{margin:0;color:var(--muted);line-height:1.55}.dashboard{display:grid;grid-template-columns:1.35fr .85fr;gap:14px}.panel{padding:20px;border:1px solid var(--line);border-radius:19px;background:var(--panel)}.panel h3{margin:0 0 15px}.timeline{display:grid;gap:14px}.event{display:grid;grid-template-columns:14px 1fr;gap:12px}.dot{width:10px;height:10px;margin-top:6px;border-radius:50%;background:var(--accent2);box-shadow:0 0 0 5px #22d3ee18}.event strong{display:block}.event span{color:var(--muted);font-size:13px;line-height:1.5}.todo{display:grid;gap:10px}.todo label{display:flex;gap:10px;align-items:flex-start;padding:11px;border-radius:12px;background:#02061755;color:#dbe4f3}.todo small{display:block;color:var(--muted);margin-top:4px}.docview{max-width:980px;margin:auto}.back{margin-bottom:16px;padding:10px 13px;border:1px solid var(--line);border-radius:11px;background:var(--panel);color:white;cursor:pointer}.dochead{padding:30px;border:1px solid var(--line);border-radius:22px;background:linear-gradient(145deg,#312e81aa,#0f172add)}.dochead h1{margin:10px 0;font-size:clamp(34px,6vw,56px)}.dochead p{color:#c8d3e5;line-height:1.7}.content{margin-top:15px;padding:24px;border:1px solid var(--line);border-radius:18px;background:var(--panel)}.content h2{margin-top:0}.content p,.content li{color:#b9c4d6;line-height:1.8}.chips{display:flex;gap:8px;flex-wrap:wrap}.chip{padding:8px 11px;border:1px solid #8b5cf655;border-radius:999px;background:#8b5cf61c;color:#ddd6fe}.empty{padding:40px;text-align:center;border:1px dashed var(--line);border-radius:18px;color:var(--muted)}@media(max-width:1050px){.grid{grid-template-columns:repeat(2,1fr)}.stats{grid-template-columns:repeat(2,1fr)}.dashboard{grid-template-columns:1fr}}@media(max-width:760px){.shell{grid-template-columns:1fr;padding:12px}.side{position:static;height:auto}.nav{grid-template-columns:repeat(3,1fr)}.sidefoot{display:none}.hero{flex-direction:column;align-items:flex-start}.hero .score{width:100%}.grid{grid-template-columns:1fr}.topbar{flex-direction:column;align-items:stretch}.pill{text-align:center}}@media(max-width:480px){.nav{grid-template-columns:1fr 1fr}.stats{grid-template-columns:1fr}.hero{padding:24px}}
</style>
</head>
<body><div id="app"></div>
<script>
const docs=[
{id:'start',title:'처음 시작하기',desc:'새 프로젝트와 새 AI 채팅이 가장 먼저 읽는 출발 문서',icon:'🚩',cat:'시작하기',body:['목적을 한 문장으로 정한다.','첫 버전은 핵심 기능 1~3개로 제한한다.','GitHub 반영과 실제 배포 확인 전에는 완료라고 판단하지 않는다.'],related:['rules','checklist','prompts']},
{id:'rules',title:'AI 협업 규칙',desc:'AI를 개발자처럼 활용하면서 방향과 품질을 지키는 방법',icon:'🤖',cat:'AI 협업',body:['사용자는 제품 방향과 실제 사용 느낌을 판단한다.','AI는 설계, 구현, 오류 분석, 기록을 담당한다.','작은 기능 정의 → 구현 → 기록 → 배포 → 확인 순서로 진행한다.'],related:['start','memory','troubleshooting']},
{id:'prompts',title:'Prompt Library',desc:'프로젝트 시작, 버그 수정, 리뷰와 배포에 쓰는 재사용 요청문',icon:'💬',cat:'라이브러리',body:['좋은 프롬프트에는 목적, 현재 상황, 완료 기준이 들어간다.','확인하지 않은 결과를 완료라고 말하지 않도록 명시한다.','반복되는 요청은 템플릿으로 저장한다.'],related:['patterns','rules','template']},
{id:'patterns',title:'Pattern Library',desc:'검색, 카드, 사이드바, 모달 등 반복 UI와 제품 패턴',icon:'🧩',cat:'라이브러리',body:['패턴은 문제, 적용 상황, 구현 규칙, 완료 기준을 함께 기록한다.','기존 기능을 깨지 않는 재사용 단위로 관리한다.','GuideFlow에서 검증된 패턴을 다른 프로젝트에 재사용한다.'],related:['prompts','troubleshooting','guideflow']},
{id:'memory',title:'AI Memory',desc:'결정 이유, 실패한 시도와 재사용 가능한 교훈을 저장',icon:'🧠',cat:'지식 엔진',body:['무엇을 했는지만 아니라 왜 선택했는지 기록한다.','실패한 시도와 실제 결과를 함께 남긴다.','다음 프로젝트에서 사용할 한 줄 규칙으로 요약한다.'],related:['timeline','rules','guideflow']},
{id:'timeline',title:'Project Timeline',desc:'프로젝트의 변화와 중요한 결정을 시간 순서로 확인',icon:'🕒',cat:'지식 엔진',body:['날짜, 상황, 결정, 결과, 배움을 기록한다.','기능 목록이 아니라 판단의 흐름을 보존한다.','중요한 전환점은 AI Memory와 연결한다.'],related:['memory','guideflow','template']},
{id:'template',title:'Project Template',desc:'새 프로젝트의 README, 규칙, 체크리스트를 빠르게 시작',icon:'📦',cat:'생산성',body:['프로젝트 목적과 사용자를 먼저 작성한다.','Start Here, README, 결정 기록, 문제 해결 문서를 준비한다.','첫 스프린트의 완료 기준을 명확히 적는다.'],related:['start','checklist','prompts']},
{id:'checklist',title:'Project Checklist',desc:'목적부터 GitHub와 Vercel 검증까지 빠뜨리지 않는 순서',icon:'✅',cat:'생산성',body:['누가 어떤 상황에서 무엇을 쉽게 하게 만들지 정의한다.','필수 기능만 선정한다.','GitHub main 반영과 배포 사이트 동작을 각각 확인한다.'],related:['start','template','troubleshooting']},
{id:'troubleshooting',title:'Troubleshooting',desc:'증상, 원인, 해결, 검증과 다음 체크리스트를 기록',icon:'🛠️',cat:'문제 해결',body:['보이는 현상과 기대 결과를 먼저 구분한다.','추측이 아닌 관련 파일과 로그를 확인한다.','가장 작은 수정 후 실제 사용 흐름으로 검증한다.'],related:['rules','patterns','guideflow']},
{id:'guideflow',title:'GuideFlow Case Study',desc:'실제 프로젝트에서 얻은 오류 해결과 제품 결정 사례',icon:'🧭',cat:'사례',body:['Scene Numbering, Duplicate Scene, Image Replace 문제를 기록했다.','Pointer Event, GitHub 연동, Vercel 404 해결 경험을 재사용한다.','실패를 숨기지 않고 다음 프로젝트의 체크리스트로 바꾼다.'],related:['timeline','memory','troubleshooting']}
];
const projects=[{name:'AI Development Wiki',status:'진행 중',progress:72,next:'Knowledge Graph와 템플릿 생성기',icon:'🧠'},{name:'GuideFlow',status:'사례 정리',progress:84,next:'실패 사례와 패턴 연결',icon:'🧭'},{name:'Next Project',status:'준비',progress:15,next:'목적과 최소 기능 정의',icon:'🚀'}];
const timeline=[['오늘','AI Development OS 대시보드','문서 저장소를 프로젝트 운영 화면으로 확장'],['최근','Memory · Timeline · Prompt · Pattern','재사용 가능한 지식 모듈을 GitHub에 추가'],['시작','AI Development Wiki','GuideFlow 경험을 다음 프로젝트에 재사용하기 위해 생성']];
let view='home',query='';
const app=document.getElementById('app');
function nav(id){view=id;location.hash=id==='home'?'':id;render();window.scrollTo(0,0)}
function side(){return `<aside class="side"><div class="brand"><div class="logo">⚡</div><div><strong>AI Development OS</strong><span>Build · Learn · Reuse</span></div></div><div class="nav"><button class="${view==='home'?'on':''}" onclick="nav('home')">⌂ 대시보드</button><button onclick="document.getElementById('q').focus()">⌕ 지식 검색</button><button onclick="nav('memory')">🧠 AI Memory</button><button onclick="nav('prompts')">💬 Prompt Library</button><button onclick="nav('patterns')">🧩 Pattern Library</button><button onclick="nav('timeline')">🕒 Timeline</button></div><div class="sidefoot">GitHub가 지식 원본입니다.<br>확인되지 않은 배포는 완료로 판단하지 않습니다.</div></aside>`}
function home(){const filtered=docs.filter(d=>(d.title+d.desc+d.cat+d.body.join(' ')).toLowerCase().includes(query.toLowerCase()));return `<div class="topbar"><label class="search">⌕<input id="q" value="${query}" placeholder="문서, 패턴, 프롬프트 검색" oninput="query=this.value;render()"></label><div class="pill">Sprint Dashboard</div></div><section class="hero"><div><h1>Build smarter.<br>Remember everything.</h1><p>프로젝트, 프롬프트, 문제 해결 기록과 재사용 패턴을 한 화면에서 관리합니다. 새로운 프로젝트는 과거의 경험 위에서 더 빠르게 시작합니다.</p></div><div class="score"><strong>72%</strong><span>Development OS 구축도</span></div></section><div class="stats"><div class="stat"><span>지식 문서</span><strong>${docs.length}</strong></div><div class="stat"><span>활성 프로젝트</span><strong>${projects.length}</strong></div><div class="stat"><span>재사용 모듈</span><strong>5</strong></div><div class="stat"><span>다음 스프린트</span><strong>#4</strong></div></div><section class="section"><div class="sectionhead"><h2>프로젝트 현황</h2><span>현재 상태와 다음 행동</span></div><div class="grid">${projects.map(p=>`<article class="card"><div class="icon">${p.icon}</div><span class="tag">${p.status}</span><h3>${p.name}</h3><p>${p.next}</p><p style="margin-top:12px;color:#fff">진행률 ${p.progress}%</p></article>`).join('')}</div></section><section class="section dashboard"><div class="panel"><div class="sectionhead"><h2>지식 라이브러리</h2><span>${filtered.length}개 결과</span></div><div class="grid">${filtered.map(d=>`<button class="card" onclick="nav('${d.id}')"><div class="icon">${d.icon}</div><span class="tag">${d.cat}</span><h3>${d.title}</h3><p>${d.desc}</p></button>`).join('')||'<div class="empty">검색 결과가 없습니다.</div>'}</div></div><div><div class="panel"><h3>다음 할 일</h3><div class="todo"><label><input type="checkbox"> <span>Knowledge Graph 연결<small>문서 관계를 시각화하고 학습 경로 제공</small></span></label><label><input type="checkbox"> <span>Template Generator<small>새 프로젝트 문서 세트 자동 생성</small></span></label><label><input type="checkbox"> <span>검색 고도화<small>태그·카테고리·최근 검색 추가</small></span></label></div></div><div class="panel" style="margin-top:14px"><h3>최근 타임라인</h3><div class="timeline">${timeline.map(t=>`<div class="event"><div class="dot"></div><div><strong>${t[1]}</strong><span>${t[0]} · ${t[2]}</span></div></div>`).join('')}</div></div></div></section>`}
function doc(id){const d=docs.find(x=>x.id===id);if(!d)return home();return `<div class="topbar"><button class="back" onclick="nav('home')">← 대시보드</button><div class="pill">${d.cat}</div></div><article class="docview"><header class="dochead"><div style="font-size:32px">${d.icon}</div><h1>${d.title}</h1><p>${d.desc}</p></header><section class="content"><h2>핵심 내용</h2><ul>${d.body.map(x=>`<li>${x}</li>`).join('')}</ul></section><section class="content"><h2>관련 지식</h2><div class="chips">${d.related.map(id=>{const r=docs.find(x=>x.id===id);return r?`<button class="chip" onclick="nav('${r.id}')">${r.icon} ${r.title}</button>`:''}).join('')}</div></section></article>`}
function render(){app.innerHTML=`<div class="shell">${side()}<main class="main">${view==='home'?home():doc(view)}</main></div>`}
const hash=location.hash.replace('#/','').replace('#','');if(hash&&docs.some(d=>d.id===hash))view=hash;render();
</script></body></html>
